# 原料成本占比偏高 — 操作建议手册
#
# 触发条件: raw_material_cost_ratio > benchmark.range[1]
# 严重程度: 超过上限5个百分点以内=中等, 超过5+=严重

diagnosis_code: raw_material_cost_ratio_high
trigger_metric: raw_material_cost_ratio
trigger_condition: "actual > range_high"
display_name: "原料成本占比偏高"

severity_levels:
  moderate:
    condition: "actual - range_high <= 5"
    label: "中等偏高"
    urgency: "建议优化"
  severe:
    condition: "actual - range_high > 5"
    label: "严重偏高"
    urgency: "立即行动"

diagnosis_checklist:
  - question: "原料成本上升是行业性的还是企业特有的？"
    if_industry: "关注大宗商品价格波动，考虑期货套保"
    if_company: "排查采购管理和供应商问题"
  - question: "哪类原料成本占比最高(TOP3)？"
    if_known: "聚焦TOP3原料的价格优化"
  - question: "是否有原料替代的可能性？"
    if_yes: "评估替代原料的品质和成本"

action_plans:
  - id: 1
    name: "采购策略优化"
    priority: "P0"
    actions:
      - "建立核心原料价格监测体系(跟踪大宗商品指数)"
      - "对占比>10%的原料实行招标/竞价采购"
      - "评估集中采购/联合采购的可能性"
      - "与核心供应商签订年度价格锁定协议"
      - "分析物流成本——就近采购 vs 远程低价的总成本对比"
    expected_impact: "采购成本降低3-8%"

  - id: 2
    name: "配方与工艺优化"
    priority: "P0"
    actions:
      - "评估配方中高成本原料的替代方案(不影响品质前提下)"
      - "优化配方精度——减少过量投料(如油脂/糖/添加剂)"
      - "提高原料利用率——减少加工过程中的边角料和损耗"
      - "建立BOM(物料清单)标准用量 vs 实际用量的偏差分析"
    expected_impact: "单位产品原料消耗降低2-5%"

  - id: 3
    name: "供应链效率提升"
    priority: "P1"
    actions:
      - "优化原料库存管理——JIT采购减少资金占用"
      - "建立供应商分级体系(战略/优选/合格/淘汰)"
      - "评估自建供应链(养殖/种植基地)的可行性"
      - "数字化采购系统——自动比价、自动下单"
    expected_impact: "供应链总成本降低5-10%"

sub_sector_notes:
  肉制品:
    - "猪肉/牛肉价格周期波动大(猪周期3-4年)——建议期货套保"
    - "冷鲜肉 vs 冻肉的成本差异可达15-20%"
    - "考虑向上游延伸(自建/合作养殖基地)"
    - "参考双汇模式：产业链一体化控制原料成本"
  乳制品:
    - "原奶成本占比60%+——牧场合作模式直接影响利润"
    - "进口奶源 vs 国内奶源的性价比分析"
    - "季节性奶价波动——春季高产期锁定价格"
  速冻食品:
    - "面粉/肉类/蔬菜三大原料——分品类建立价格对标"
    - "速冻食品原料成本占比高(55-70%)——产品结构优化是关键"
    - "高端产品线(虾饺/蟹黄包)毛利高但原料成本更高"
  烘焙食品:
    - "面粉/油脂/糖是三大成本项——进口 vs 国产面粉差价大"
    - "黄油价格受国际市场影响——可评估植物黄油替代"
    - "短保 vs 长保产品的原料配方差异对成本的影响"
  饮料:
    - "包装水原料成本极低(水+PET瓶)——PET粒子价格是关键变量"
    - "果汁浓缩液/茶叶原料的产地和品质直接影响成本"
    - "甜味剂替代蔗糖可降低成本(代糖趋势)"
  调味品:
    - "大豆/小麦是酱油的核心原料——关注大宗粮食价格"
    - "高端调味品使用非转基因原料，成本高20-30%"
    - "调味品保质期长，可在原料低价期适当囤货"

decision_tree:
  root: "原料成本占比是否超过子行业上限？"
  yes:
    question: "是行业性涨价还是企业特有问题？"
    industry:
      action: "应对策略：价格锁定协议 + 期货套保 + 配方替代"
    company:
      question: "是否有BOM标准用量？"
      no:
        action: "首先建立BOM体系，量化偏差"
      yes:
        action: "采购策略优化(P0) + 配方优化(P0)"
  no:
    action: "成本达标，持续监控大宗商品价格趋势"
