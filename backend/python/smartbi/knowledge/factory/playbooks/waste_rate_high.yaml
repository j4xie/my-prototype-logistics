# 废品率偏高 — 操作建议手册
#
# 触发条件: waste_rate > benchmark.range[1]
# 严重程度: 超过上限2个百分点以内=中等, 超过2+=严重

diagnosis_code: waste_rate_high
trigger_metric: waste_rate
trigger_condition: "actual > range_high"
display_name: "废品率偏高"

severity_levels:
  moderate:
    condition: "actual - range_high <= 2"
    label: "中等偏高"
    urgency: "建议优化"
  severe:
    condition: "actual - range_high > 2"
    label: "严重偏高"
    urgency: "立即行动"

diagnosis_checklist:
  - question: "废品主要产生在哪个环节(原料/加工/包装/仓储)？"
    if_processing: "聚焦工艺参数和设备精度"
    if_packaging: "检查包装设备和材料"
    if_storage: "检查仓储条件(温湿度/先进先出)"
  - question: "废品是否有批次性特征？"
    if_yes: "追溯该批次的原料来源和生产记录"
  - question: "是否有废品分类统计(可返工/完全报废)？"
    if_no: "先建立废品分类台账"

action_plans:
  - id: 1
    name: "废品分类与追溯"
    priority: "P0"
    actions:
      - "建立废品分类台账：可返工品/降级品/完全报废品"
      - "按工序统计废品率，找出TOP3废品产生环节"
      - "对每批废品记录原因代码(设备/原料/操作/工艺)"
      - "月度废品帕累托分析，聚焦80%废品的20%原因"
    expected_impact: "废品原因定位准确率提升至90%"

  - id: 2
    name: "过程控制强化"
    priority: "P0"
    actions:
      - "在废品高发工序增加在线检测点"
      - "设备关键参数实时监控报警(超限自动停机)"
      - "推行首件检验+巡检制度"
      - "工序间增加半成品抽检(避免不良品流入下工序)"
    expected_impact: "过程废品率降低30-50%"

  - id: 3
    name: "返工与降级利用"
    priority: "P1"
    actions:
      - "评估可返工废品的比例，制定返工SOP"
      - "建立降级品处理渠道(如作为动物饲料/工业原料)"
      - "核算返工成本 vs 报废成本，确保返工经济可行"
      - "建立废品处理台账，确保食品安全合规(不能流入正品渠道)"
    expected_impact: "废品损失金额降低20-40%"

  - id: 4
    name: "预防性改善"
    priority: "P1"
    actions:
      - "开展8D/A3问题分析，找出废品根本原因"
      - "制定设备预防性维护计划(TPM)"
      - "员工操作标准化培训(重点是新员工和换线操作)"
      - "引入防错(Poka-Yoke)装置——物理防止错误操作"
    expected_impact: "废品率持续降低至行业基准以内"

sub_sector_notes:
  肉制品:
    - "肉制品废品以微生物超标为主——加强CIP和环境消毒"
    - "边角料利用率提升：肉糜/肉酱/宠物食品原料"
    - "金属异物检测是必检项——建议全线在线检测"
  乳制品:
    - "灌装溢出和短灌是主要废品来源——校准灌装头"
    - "酸奶/冰品换线时的料液损耗需精确计量"
    - "UHT灭菌温度不达标→整批废弃(不可返工)"
  速冻食品:
    - "冻裂和粘连是主要废品类型——优化速冻隧道温度梯度"
    - "包装破损(抽真空/封口)导致冻品霜化——定期维护封口机"
    - "克重不足也算废品——称量系统需定期校准"
  烘焙食品:
    - "烤制不均(色泽/口感)是最大废品来源——检查烤箱温场均匀性"
    - "短保面包的过期退货也应纳入废品统计"
    - "面包类可降级做面包糠/面包粉(资源化利用)"
  饮料:
    - "灌装线废品率极低(<0.5%)——异常时先检查PET瓶/瓶盖质量"
    - "标签贴错/歪斜是主要外观废品——视觉检测系统可解决"
    - "调配环节的不合格品可通过在线Brix监测预防"

decision_tree:
  root: "废品率是否超过子行业上限？"
  yes:
    question: "是否有废品分类台账？"
    no:
      action: "首先建立：废品分类与追溯体系(P0)"
    yes:
      question: "TOP1废品原因是否明确？"
      yes:
        action: "定向改善：过程控制强化(P0) + 预防性改善(P1)"
      no:
        action: "先做帕累托分析定位原因，再定向改善"
  no:
    action: "废品率达标，关注返工利用率降低损失"
