# 良品率偏低 — 操作建议手册
#
# 触发条件: yield_rate < benchmark.range[0]
# 严重程度: 低于下限2个百分点以内=中等, 超过2+=严重

diagnosis_code: yield_rate_low
trigger_metric: yield_rate
trigger_condition: "actual < range_low"
display_name: "良品率偏低"

severity_levels:
  moderate:
    condition: "range_low - actual <= 2"
    label: "轻度偏低"
    urgency: "建议排查"
  severe:
    condition: "range_low - actual > 2"
    label: "严重偏低"
    urgency: "立即整改"

diagnosis_checklist:
  - question: "良品率下降是突发还是渐进趋势？"
    if_sudden: "排查近期设备故障、原料批次变更、新员工上岗"
    if_gradual: "系统性排查工艺参数漂移和设备老化"
  - question: "不良品主要集中在哪个工序？"
    if_known: "针对该工序进行详细SPC分析"
  - question: "是否有原材料来料检验不合格记录？"
    if_yes: "追溯供应商，评估是否需要更换或加严验收"

action_plans:
  - id: 1
    name: "工艺参数优化"
    priority: "P0"
    actions:
      - "收集近30天关键工艺参数(温度/压力/时间/速度)，做SPC控制图"
      - "找出参数漂移的控制点，重新校准设备"
      - "建立关键工序首件检验制度"
      - "编制标准作业指导书(SOP)，减少人为操作差异"
    expected_impact: "良品率提升1-3个百分点"

  - id: 2
    name: "来料质量管控"
    priority: "P0"
    actions:
      - "分析不合格品与原料批次的关联性"
      - "对关键原料增加来料检验项目和频次"
      - "建立供应商质量评分体系，末位淘汰"
      - "与供应商协商质量协议(QA)，约定不良率上限"
    expected_impact: "因来料导致的不良减少50%以上"

  - id: 3
    name: "设备维护升级"
    priority: "P1"
    actions:
      - "检查关键设备的预防性维护计划执行率"
      - "分析设备故障频次与不良品率的相关性"
      - "对老旧设备进行精度检测，评估是否需要大修或更换"
      - "引入设备状态监测(振动/温度传感器)实现预测性维护"
    expected_impact: "因设备原因导致的不良减少60-80%"

  - id: 4
    name: "人员技能提升"
    priority: "P1"
    actions:
      - "分析不同班组/操作员的良品率差异"
      - "对末位班组进行定向培训"
      - "实行多能工制度，关键岗位至少2人可替代"
      - "建立质量激励制度(良品率达标奖励)"
    expected_impact: "人为操作导致的不良减少40-60%"

sub_sector_notes:
  肉制品:
    - "切割工序损耗大——标准化切割模具可提升良品率3-5%"
    - "温度控制是关键——超温15分钟即可导致整批次不合格"
    - "金属检测仪/X光机在线检测可拦截异物不良品"
  乳制品:
    - "UHT灌装线良品率应>99%，低于此值检查灌装头密封"
    - "酸奶发酵温控偏差±1°C即可影响产品口感和质量"
    - "CIP清洗不彻底是微生物超标的主要原因"
  速冻食品:
    - "速冻隧道温度不均匀导致部分产品冻裂——检查风道设计"
    - "成型工序(如饺子机)的填充量一致性直接影响克重合格率"
    - "包装密封不良导致冻品霜化，需定期校准封口机"
  烘焙食品:
    - "烘焙温度和时间是最关键参数——±5°C可导致批量报废"
    - "面团醒发时间不足/过度都会影响成品质量"
    - "自动化称量替代人工配料可减少配方误差"
  调味品:
    - "酿造类产品发酵周期长，中间检测点需增加"
    - "灌装线的定量精度影响净含量合格率"
    - "标签印刷质量也纳入良品率统计(GB 7718要求)"

decision_tree:
  root: "良品率是否低于子行业下限？"
  yes:
    question: "下降是近期突发的吗？"
    yes:
      action: "紧急排查：来料变更(P0) + 设备故障(P1)"
    no:
      question: "不良品是否集中在某个工序？"
      yes:
        action: "定向改善：工艺参数优化(P0)"
      no:
        action: "系统改善：全流程SPC + 人员培训(P0+P1)"
  no:
    action: "良品率达标，持续监控并追求卓越(>99%)"
