# 调味品行业基准
# 数据来源: 海天味业/千禾味业/中炬高新年报 + 中国调味品协会

source: "海天味业/千禾味业年报 / 中国调味品协会"
year: 2024

metrics:
  gross_margin:
    name: "毛利率"
    range: [35.0, 50.0]
    median: 42.0
    unit: "%"
    source: "海天味业毛利率约36%, 千禾味业约47%"
    note: "高端酱油/蚝油毛利显著高于基础品"

  net_margin:
    name: "净利率"
    range: [8.0, 15.0]
    median: 12.0
    unit: "%"
    source: "海天味业净利率约23%(行业极值), 中小企业约8-12%"
    note: "调味品是食品行业利润率最高的子行业之一"

  oee:
    name: "设备综合效率(OEE)"
    range: [60.0, 82.0]
    median: 70.0
    unit: "%"
    note: "酿造类(酱油/醋)发酵周期长, 影响整体OEE"

  raw_material_cost_ratio:
    name: "原料成本占比"
    range: [40.0, 55.0]
    median: 48.0
    unit: "%"
    note: "大豆/小麦等原料成本相对稳定, 低于肉/乳制品"

  inventory_turnover_days:
    name: "存货周转天数"
    range: [60, 180]
    median: 100
    unit: "天"
    note: "酿造类调味品(酱油/醋)需要长时间发酵, 存货周期长"
