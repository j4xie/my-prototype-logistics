# 食材成本率偏高 — 操作建议手册
#
# 触发条件: food_cost_ratio > benchmark.range[1]
# 严重程度: 超过上限5个百分点以内=中等, 超过5+=严重

diagnosis_code: food_cost_ratio_high
trigger_metric: food_cost_ratio
trigger_condition: "actual > range_high"
display_name: "食材成本率偏高"

severity_levels:
  moderate:
    condition: "actual - range_high <= 5"
    label: "中等偏高"
    urgency: "建议优化"
  severe:
    condition: "actual - range_high > 5"
    label: "严重偏高"
    urgency: "立即行动"

diagnosis_checklist:
  - question: "是否有明确的食材成本目标值？"
    if_no: "先设定目标（建议参照子行业中位数）"
  - question: "最近3个月食材成本率趋势是上升还是稳定？"
    if_rising: "排查近期采购价格变化、新菜品引入、供应商变更"
  - question: "是否存在高成本菜品销量占比过高？"
    if_yes: "进行菜品四象限分析，调整菜单结构"

action_plans:
  - id: 1
    name: "采购优化"
    priority: "P0"
    actions:
      - "分析供应商集中度，前3大供应商占比>60%时引入竞争性供应商"
      - "对比同品类不同供应商价格，建立价格对标表"
      - "评估集采/联合采购可能性（适用于连锁品牌）"
      - "检查采购频次，是否可通过减少配送次数降低物流成本"
    expected_impact: "食材成本降低2-5个百分点"

  - id: 2
    name: "菜单结构调整"
    priority: "P0"
    actions:
      - "用菜品四象限分析识别Dog类菜品（低销量+低利润），考虑下架"
      - "提高Star类菜品（高销量+高利润）的菜单位置和推荐力度"
      - "Plow类菜品（高销量+低利润）通过缩小份量或微调售价提升毛利"
      - "控制新品引入频率，新品成本率需在目标以内"
    expected_impact: "综合毛利提升1-3个百分点"

  - id: 3
    name: "损耗控制"
    priority: "P1"
    actions:
      - "建立食材验收标准，拒收不合格品"
      - "优化备料量预测（参考历史销售数据+天气+节假日）"
      - "实行先进先出(FIFO)管理，减少过期报废"
      - "追踪各门店损耗率差异，末位门店定向改善"
    expected_impact: "减少损耗3-5个百分点，间接降低成本率1-2%"

  - id: 4
    name: "定价策略审查"
    priority: "P1"
    actions:
      - "检查折扣率是否过高（>15%需警惕）"
      - "评估套餐定价是否合理（套餐毛利 vs 单点毛利）"
      - "对比竞品同类菜品定价，找到提价空间"
      - "考虑引入高毛利附加品（饮品/甜品/小食）"
    expected_impact: "有效提高客单价2-5元，降低成本率1-2%"

sub_sector_notes:
  火锅:
    - "锅底成本是关键变量——牛油锅底成本远高于清汤/番茄"
    - "涮品预切标准化可降低后厨损耗"
    - "自助小料台的成本常被忽视（占比可达3-5%）"
    - "参考海底捞：自建供应链可将损耗控制在5%以下"
  快餐:
    - "标准化程度高，成本率偏差通常来自原材料价格波动"
    - "建议锁定核心食材的月度/季度价格"
    - "包装材料成本需纳入计算（外卖占比高时影响显著）"
  烧烤:
    - "肉类采购量大，冷链仓储损耗是主要控制点"
    - "腌制环节的调料配比标准化可稳定成本"
    - "炭火/燃气成本单独核算，可能占总成本3-5%"
  西餐:
    - "进口食材占比高，汇率波动需对冲"
    - "酱汁/Stock的批量制作可显著降低人工+食材成本"
    - "面包篮等免费附赠品的成本不可忽视"
  日料:
    - "鱼类海鲜保质期短，损耗率可达20-30%(远高于均值)"
    - "建立每日采购量与预订量的联动机制"
    - "培训切割技术减少边角料浪费"

decision_tree:
  root: "食材成本率是否超过子行业上限？"
  yes:
    question: "近3月趋势是否上升？"
    yes:
      action: "紧急启动：采购优化(P0) + 损耗控制(P1)"
    no:
      question: "菜品四象限分析中Dog类占比>20%？"
      yes:
        action: "优先执行：菜单结构调整(P0)"
      no:
        action: "执行：定价策略审查(P1) + 采购优化(P0)"
  no:
    action: "当前成本率健康，定期监控即可"
