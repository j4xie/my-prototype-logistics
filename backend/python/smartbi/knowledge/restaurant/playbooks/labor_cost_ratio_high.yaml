# 人力成本率偏高 — 操作建议手册

diagnosis_code: labor_cost_ratio_high
trigger_metric: labor_cost_ratio
trigger_condition: "actual > range_high"
display_name: "人力成本率偏高"

severity_levels:
  moderate:
    condition: "actual - range_high <= 5"
    label: "中等偏高"
  severe:
    condition: "actual - range_high > 5"
    label: "严重偏高"

action_plans:
  - id: 1
    name: "排班优化"
    priority: "P0"
    actions:
      - "分析各时段客流量，识别闲时人力冗余（通常14:00-17:00是低谷）"
      - "推行弹性排班制，高峰时段增人、低谷时段减人"
      - "引入兼职/小时工覆盖周末和节假日高峰"
      - "对比各门店人效(营收/人数)，末位门店定向优化排班"
    expected_impact: "人力成本降低2-4个百分点"

  - id: 2
    name: "效率提升"
    priority: "P0"
    actions:
      - "梳理前厅后厨动线，减少无效走动"
      - "标准化操作流程(SOP)，缩短出餐时间"
      - "引入自助点餐/扫码点餐，减少前厅服务员需求"
      - "评估中央厨房/预制菜方案，减少门店后厨人数"
    expected_impact: "人均服务桌数提升20-30%"

  - id: 3
    name: "薪酬结构优化"
    priority: "P1"
    actions:
      - "建立绩效奖金制度（与翻台率/客单价/好评率挂钩）"
      - "评估固定薪酬 vs 底薪+提成模式的成本差异"
      - "对比同区域同品类竞品薪资水平，避免过高基本工资"
    expected_impact: "优化薪资结构，人力成本降低1-3%"

  - id: 4
    name: "自动化/数字化"
    priority: "P2"
    actions:
      - "评估智能收银系统替代人工收银可行性"
      - "考虑传菜机器人/送餐轨道(适用于火锅/快餐)"
      - "引入智能排班软件，基于历史数据自动生成排班表"
    expected_impact: "长期减少1-2名全职员工/门店"

sub_sector_notes:
  火锅:
    - "海底捞人力成本率约31%，属于高服务溢价模式——如果你不走高服务路线，不应对标海底捞"
    - "火锅服务相对简单(客户自涮)，应控制在25%以下"
    - "传菜机器人在火锅店效果好(固定路线+标准化)"
  快餐:
    - "快餐标准化程度高，人力成本应控制在22%以下"
    - "自助点餐机是最快见效的投入(通常3-6个月回本)"
    - "中央厨房配送可大幅减少门店厨师数量"
  西餐:
    - "高端西餐服务是核心体验，不宜过度削减前厅"
    - "重点优化后厨效率——酱汁/Stock批量制备、mise en place标准化"
  日料:
    - "师傅技艺是核心竞争力，不宜通过降薪节省"
    - "可在非核心岗位(传菜/清洁/备料)引入兼职"
