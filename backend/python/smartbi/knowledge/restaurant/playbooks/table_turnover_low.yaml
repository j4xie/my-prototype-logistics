# 翻台率偏低 — 操作建议手册

diagnosis_code: table_turnover_low
trigger_metric: table_turnover
trigger_condition: "actual < range_low"
display_name: "翻台率偏低"

severity_levels:
  moderate:
    condition: "range_low - actual <= 0.5"
    label: "略低"
  severe:
    condition: "range_low - actual > 0.5"
    label: "严重偏低"

action_plans:
  - id: 1
    name: "出餐速度优化"
    priority: "P0"
    actions:
      - "测量从点单到上菜的平均时间，设定目标(快餐<10分钟,正餐<20分钟)"
      - "识别出餐瓶颈环节(备料不足/设备不够/人手紧张)"
      - "增加预制菜/半成品使用比例，减少现场加工时间"
      - "优化厨房动线和工位布局"
    expected_impact: "出餐时间缩短30%,翻台率提升0.5-1.0次/天"

  - id: 2
    name: "翻桌效率提升"
    priority: "P0"
    actions:
      - "设定收桌标准时间(正餐<5分钟,快餐<3分钟)"
      - "训练服务员主动引导用餐完毕客人"
      - "午市/晚市高峰期适当限制用餐时间(如火锅120分钟)"
      - "优化收银结账流程(扫码支付替代排队结账)"
    expected_impact: "翻桌间隔缩短50%"

  - id: 3
    name: "客流引导"
    priority: "P1"
    actions:
      - "分析客流时段分布，低谷期推出限时优惠引流"
      - "利用美团/大众点评推广非高峰时段套餐"
      - "考虑引入预约排号系统，减少空桌等待时间"
      - "外卖增量——翻台不够、外卖来凑(注意利润率)"
    expected_impact: "低谷时段客流提升20-30%"

  - id: 4
    name: "座位利用率优化"
    priority: "P1"
    actions:
      - "分析不同桌型(2人/4人/6人/包间)的使用率和等位率"
      - "如果2人桌常坐1人、4人桌常坐2人，考虑调整桌型比例"
      - "高峰期拼桌政策(适用于快餐/小吃)"
    expected_impact: "座位利用率提升15-25%"

sub_sector_notes:
  火锅:
    - "火锅用餐时间天然较长(90-120分钟)，翻台上限约5次"
    - "限时用餐政策需谨慎——容易引发差评"
    - "锅底预热时间可通过预点单缩短(客人等位时即可点锅底)"
  快餐:
    - "快餐翻台核心是出餐速度，应控制在5分钟以内"
    - "自助取餐模式可显著提升效率"
    - "堂食区改为快餐式座椅(非沙发)可减少客人停留时间"
  烧烤:
    - "烧烤社交属性强，用餐时间长(120-180分钟)是正常的"
    - "不建议强行缩短用餐时间——会损害体验"
    - "重点放在增加非高峰时段客流(午市烧烤套餐)"
  西餐:
    - "高端西餐翻台率低是正常的(1.5-2.0)，不应盲目追求高翻台"
    - "可通过增加午市商务套餐提升午间翻台"
  牛肉面:
    - "面食用餐时间短(15-30分钟)，翻台率应在7次以上"
    - "如果翻台低于5次，大概率是客流不足而非出餐慢"
