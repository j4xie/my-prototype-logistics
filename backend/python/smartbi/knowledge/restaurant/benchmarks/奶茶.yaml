# 奶茶/新茶饮行业基准数据
#
# 数据来源：
#   - 蜜雪冰城招股书 (食材成本率约28%, 加盟商毛利约65%)
#   - 奈雪的茶2024年报 (食材成本率约32.5%, 客单价29.6元, 日均出杯约340杯)
#   - 茶百道招股书/年报 (食材成本率约32%, 日均出杯约380杯)
#   - 沙利文《2024中国新茶饮行业白皮书》(市场规模3334亿, 连锁化率49%)
#   - 红餐《2025中国茶饮品类发展报告》(门店42.7万家)
#   - 美团餐饮数据观 (新茶饮客单价趋势)

source: "蜜雪冰城/奈雪年报 + 沙利文白皮书 + 红餐茶饮报告 + 美团餐饮数据观"
year: 2024

sub_sector_info:
  market_size_billion: 3334  # 亿元
  store_count: 427000  # 门店数
  chain_rate: 49  # % (茶饮连锁化率远高于餐饮大盘23%)
  growth_rate: 6.0  # %
  top_brands: "蜜雪冰城(36000+店) / 古茗(9000+店) / 茶百道(8000+店) / 沪上阿姨(7000+店)"
  avg_ticket_trend: "持续下探，10-15元价格带成主流"

metrics:
  food_cost_ratio:
    name: "食材成本率"
    range: [25.0, 35.0]
    median: 30.0
    source: "蜜雪冰城约28%(低价高效) + 奈雪约32.5% + 茶百道约32%"
    note: "鲜果茶成本高(35%+)，纯茶/奶茶成本低(25%以下)"

  labor_cost_ratio:
    name: "人力成本率"
    range: [15.0, 25.0]
    median: 20.0
    source: "奈雪人力成本率约31%(直营高服务), 加盟品牌约15-20%"
    note: "奶茶标准化程度高，人力占比低于正餐；直营品牌人力成本显著高于加盟品牌"

  average_ticket:
    name: "客单价"
    range: [8.0, 30.0]
    median: 16.0
    source: "蜜雪冰城约6-8元 + 茶百道约15元 + 奈雪约29.6元"
    note: "2024年价格战加剧，中高端品牌纷纷降价，10-15元成主流价格带"

  daily_cups:
    name: "日均出杯量"
    range: [300, 600]
    median: 400
    unit: "杯/店/天"
    source: "奈雪约340杯 + 茶百道约380杯 + 蜜雪冰城约500杯"
    note: "高峰期(夏季)可达日均600+杯，冬季低谷约200杯"

  cup_cost:
    name: "单杯成本"
    range: [3.0, 10.0]
    median: 5.5
    unit: "元/杯"
    source: "蜜雪冰城单杯成本约3元(极致供应链), 奈雪约9-10元(鲜果+直营)"
    note: "包含原料+包材+制作人工分摊，不含房租"

  restaurant_net_margin:
    name: "门店净利率"
    range: [8.0, 20.0]
    median: 15.0
    source: "蜜雪冰城加盟商净利约15-20% + 茶百道加盟商约12-15%"
    note: "加盟模式净利高于直营；选址和租金是核心变量"

  rent_ratio:
    name: "租金占比"
    range: [10.0, 25.0]
    median: 15.0
    unit: "%"
    source: "奈雪租金占比约15% + 行业报告"
    note: "奶茶店面积小(15-40㎡)但选址要求高(商圈/学校/交通枢纽)"
    higher_is_worse: true

  waste_loss_rate:
    name: "物料损耗率"
    range: [3.0, 8.0]
    median: 5.0
    source: "行业调研数据"
    note: "鲜果损耗高(8-12%)，茶叶/奶基底损耗低(2-3%)"
    higher_is_worse: true
