# 咖啡行业基准数据
#
# 数据来源：
#   - 瑞幸咖啡2024年报 (食材成本率约33%, 客单价约15元, 日均出杯约530杯/店)
#   - 星巴克中国2024财年 (客单价约40元, 同店销售下降14%)
#   - 库迪咖啡公开运营数据 (9.9元定价策略)
#   - 沙利文《2024中国咖啡行业白皮书》(市场规模2654亿, 连锁化率45%)
#   - 美团《2024中国咖啡消费洞察》
#   - 红餐《2025中国咖啡品类发展报告》

source: "瑞幸/星巴克年报 + 沙利文白皮书 + 美团咖啡洞察 + 红餐报告"
year: 2024

sub_sector_info:
  market_size_billion: 2654  # 亿元
  store_count: 210000  # 门店数 (2024年底)
  chain_rate: 45  # %
  growth_rate: 15.0  # %
  top_brands: "瑞幸(21000+店) / 星巴克(7300+店) / 库迪(7000+店) / 幸运咖(3000+店)"
  penetration: "一线城市趋饱和，下沉市场高速增长"

metrics:
  food_cost_ratio:
    name: "食材成本率"
    range: [20.0, 35.0]
    median: 28.0
    source: "瑞幸约33%(补贴期偏高) + 星巴克约28% + 独立精品咖啡约22-25%"
    note: "咖啡豆成本占比低(约8-12%)，牛奶/糖浆占比更高；拿铁类产品食材成本高于美式"

  labor_cost_ratio:
    name: "人力成本率"
    range: [18.0, 30.0]
    median: 22.0
    source: "瑞幸人力成本率约18%(高自动化) + 星巴克约28%(体验型服务)"
    note: "全自动咖啡机降低人力需求，精品手冲店人力成本高"

  table_turnover:
    name: "翻台率"
    range: [3.0, 8.0]
    median: 5.0
    source: "瑞幸快取模式翻台极高(8+) + 星巴克第三空间约3-4次"
    note: "快取店(无座位/少座位)翻台概念不同于传统餐饮，以出杯效率衡量"

  average_ticket:
    name: "客单价"
    range: [10.0, 45.0]
    median: 20.0
    source: "瑞幸约15元 + 库迪约9.9元 + 星巴克约40元 + 精品咖啡约30-45元"
    note: "2024年价格战激烈，9.9元成为常态价格锚点"

  daily_cups:
    name: "日均出杯量"
    range: [200, 600]
    median: 350
    unit: "杯/店/天"
    source: "瑞幸约530杯(成熟店) + 星巴克约300杯 + 独立咖啡约150-200杯"
    note: "瑞幸快取店出杯效率远高于行业均值"

  cup_profit_margin:
    name: "单杯毛利"
    range: [5.0, 20.0]
    median: 10.0
    unit: "元/杯"
    source: "瑞幸约7-8元/杯 + 星巴克约18-20元/杯(高溢价)"
    note: "美式毛利最高(豆成本约2元)，生椰拿铁等特调毛利次之"

  restaurant_net_margin:
    name: "门店净利率"
    range: [5.0, 18.0]
    median: 12.0
    source: "瑞幸成熟店净利约15-18% + 星巴克约12% + 独立咖啡约5-10%"
    note: "规模效应明显，单店日均300杯以上才能保证盈利"

  rent_ratio:
    name: "租金占比"
    range: [8.0, 20.0]
    median: 12.0
    unit: "%"
    source: "瑞幸快取店租金约8-10%(小面积) + 星巴克约15-20%(大面积商圈)"
    note: "快取模式(20-50㎡)大幅降低租金压力"
    higher_is_worse: true

  waste_loss_rate:
    name: "物料损耗率"
    range: [2.0, 5.0]
    median: 3.0
    source: "行业调研数据"
    note: "咖啡豆保质期长(6-12月)，损耗主要来自牛奶过期和小料过期"
    higher_is_worse: true
