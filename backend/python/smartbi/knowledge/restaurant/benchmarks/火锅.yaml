# 火锅行业基准数据
#
# 数据来源：
#   - 海底捞2024年报 (食材44.9%, 翻台4.1, 客单97.5, 人力31%)
#   - 呷哺呷哺2024年报 (食材40%, 翻台2.5/凑凑1.6, 客单54.8/123.5)
#   - 沙利文《2024中国火锅行业白皮书》(市场6175亿, 川渝66%)
#   - 餐宝典NCBD (食材38-45%, 翻台率基准)
#   - 东门口/上马火锅 POS 实测

source: "海底捞/呷哺呷哺年报 + 沙利文白皮书 + 餐宝典 + POS实测"
year: 2024

sub_sector_info:
  market_size_billion: 6175  # 亿元
  chain_rate: 27  # %
  top_share: "川渝火锅 66%"
  predicted_2025: 6500  # 亿元

metrics:
  food_cost_ratio:
    name: "食材成本率"
    range: [38.0, 48.0]
    median: 43.0
    source: "海底捞44.9% + 呷哺40% + 东门口POS实测 + 餐宝典38-45%"
    note: "火锅食材占比高于餐饮均值，因锅底+涮品双成本"

  labor_cost_ratio:
    name: "人力成本率"
    range: [25.0, 35.0]
    median: 30.0
    source: "海底捞人力成本率约31%（高服务模式）"
    note: "海底捞代表高服务天花板，小型火锅可控在25%以下"

  table_turnover:
    name: "翻台率"
    range: [2.5, 5.0]
    median: 3.5
    source: "海底捞4.1次/天 + 呷哺2.5次 + 凑凑1.6次"
    note: "高端火锅(凑凑)翻台低但客单高，大众火锅翻台高"

  average_ticket:
    name: "客单价"
    range: [55.0, 120.0]
    median: 75.0
    source: "海底捞97.5元 + 呷哺54.8元 + 凑凑123.5元 + 东门口POS"
    note: "2024年客单价整体下降，百元以上>80%降价"

  restaurant_net_margin:
    name: "餐饮净利率"
    range: [3.0, 12.0]
    median: 6.0
    source: "海底捞净利率约11% (行业标杆)"
    note: "头部品牌可达10%+，单店多在3-6%"

  waste_loss_rate:
    name: "食材损耗率"
    range: [3.0, 15.0]
    median: 8.0
    source: "海底捞损耗率控制在5%以下(行业标杆)"
    note: "火锅食材预处理环节损耗低于炒菜类"
