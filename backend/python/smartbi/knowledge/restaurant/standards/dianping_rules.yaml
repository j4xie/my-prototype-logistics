# 大众点评榜单评选规则
#
# 数据来源：
#   - 大众点评官方《必吃榜》评选规则文档
#   - 大众点评官方《黑珍珠》评选标准
#   - 大众点评官方《点评榜单》规则说明
#
# 最后更新: 2025年

必吃榜:
  dimensions:
    - "评价真实可信"
    - "口味优中选优"
    - "长期稳定体验佳"
    - "符合日常消费水平"
    - "满足日常就餐选择"
  prerequisites:
    min_record_days: 365
    min_operating_days: 182
    data_period: "2024-01-01 至 2024-12-31"
  disqualifiers:
    - "食安问题"
    - "证照不全"
    - "恶意刷评"
    - "品质严重下降"
    - "主营品类变更"
    - "严重违规经营"
    - "不受合作关系影响"
  submission_kpi:
    星级打榜:
      - "点赞星级总分"
      - "地区难度排行"
      - "热评榜排名"
      - "好评榜排名"
      - "口味榜排名"
    线上活跃量:
      - "评价日增量"
      - "店内堂食销量"
      - "单店日搜索量"
      - "套餐方案搜索量"
      - "门店访问量"
    评价质量:
      - "评价数总量"
      - "支付差评占比"
      - "好评差评权重"
      - "优质点评权重"
      - "点评回复率"

黑珍珠:
  dimensions:
    - "烹饪出品(食材品质/烹饪技艺/五感呈现/餐饮搭配/出品稳定性)"
    - "服务环境(服务水平/环境设施/服务稳定性)"
    - "传承创新(传承不守旧/创新不忘本/个人风格)"
  levels:
    三钻: "一生必吃一次的餐厅"
    二钻: "纪念日必吃的餐厅"
    一钻: "聚会必吃的餐厅"
  prerequisites:
    min_record_days: 365
    min_operating_days: 182
    license_required: true
    category: "正餐"
  note: "2025年新增AI技术辅助发现优质餐厅"

点评榜单:
  types:
    热门榜:
      period: "7天"
      metric: "真实客流量"
      threshold: "星级>=3.5"
    好评榜:
      period: "30天"
      metric: "好评数+星级综合算法"
      threshold: "星级>=4.0, 总评价数>=50"
    销量榜:
      period: "7天"
      metric: "订单量+销售额"
      threshold: "无最低星级要求"
    口味榜:
      period: "60天"
      metric: "口味单项评分"
      threshold: "星级>=4.0"
    环境榜:
      period: "60天"
      metric: "环境单项评分"
      threshold: "星级>=4.0"
    服务榜:
      period: "60天"
      metric: "服务单项评分"
      threshold: "星级>=4.0"
    人气套餐榜:
      period: "30天"
      metric: "套餐销量+评价"
      threshold: "无最低要求"
    回头客榜:
      period: "90天"
      metric: "30天内二次消费比例"
      threshold: "总评价数>=50"
  max_listings:
    全城: 100
    行政区_商圈: "5-20家(根据总商户数)"
  evaluation_thresholds:
    高线城市: "评价数>=50 + 30天新增>=1"
    中低线城市: "评价数>=10 + 90天新增>=1"
    境外_低线: "评价数>=5 + 90天新增>=1"
