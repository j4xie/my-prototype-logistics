<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1284px;
    height: 2778px;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
  }

  .container {
    width: 1284px;
    height: 2778px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* iPhone 15 Pro device frame */
  .iphone-frame {
    position: relative;
    width: 1100px;
    height: 2250px;
    background: #1a1a1c;
    border-radius: 145px;
    padding: 22px;
    box-shadow:
      0 0 0 4px #2a2a2c,
      0 0 0 8px #3a3a3c,
      inset 0 0 0 2px #3a3a3c,
      0 60px 150px rgba(0,0,0,0.35),
      0 25px 50px rgba(0,0,0,0.25);
  }

  /* Titanium side buttons - power button right */
  .iphone-frame::before {
    content: '';
    position: absolute;
    right: -7px;
    top: 450px;
    width: 8px;
    height: 175px;
    background: linear-gradient(to right, #4a4a4c, #5a5a5c, #4a4a4c);
    border-radius: 0 4px 4px 0;
  }

  /* Volume buttons + mute switch left */
  .iphone-frame::after {
    content: '';
    position: absolute;
    left: -7px;
    top: 400px;
    width: 8px;
    height: 95px;
    background: linear-gradient(to left, #4a4a4c, #5a5a5c, #4a4a4c);
    border-radius: 4px 0 0 4px;
    box-shadow: 0 138px 0 0 #4a4a4c, 0 225px 0 0 #4a4a4c;
  }

  /* Screen */
  .screen {
    width: 100%;
    height: 100%;
    border-radius: 123px;
    overflow: hidden;
    position: relative;
    background: #fff;
  }

  /* Screenshot fills screen - contain prevents bottom crop */
  .screen img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    object-position: top;
    display: block;
  }

  /* Dynamic Island - sits on TOP of everything */
  .dynamic-island {
    position: absolute;
    top: 28px;
    left: 50%;
    transform: translateX(-50%);
    width: 300px;
    height: 90px;
    background: #000;
    border-radius: 45px;
    z-index: 10;
  }

  /* iOS Status Bar - transparent, overlaid on screenshot */
  .status-bar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 135px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 40px 70px 0;
    z-index: 5;
    color: #000;
    font-size: 38px;
    font-weight: 600;
    letter-spacing: 0.5px;
    /* NO background - fully transparent overlay */
    background: transparent;
  }

  .status-bar.light { color: #fff; }

  .status-time { font-weight: 700; font-size: 40px; }

  .status-icons {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  /* Signal bars */
  .signal-bars {
    display: flex;
    align-items: flex-end;
    gap: 4px;
    height: 30px;
  }
  .signal-bars .bar {
    width: 7px;
    background: currentColor;
    border-radius: 1px;
  }
  .signal-bars .bar:nth-child(1) { height: 10px; }
  .signal-bars .bar:nth-child(2) { height: 16px; }
  .signal-bars .bar:nth-child(3) { height: 22px; }
  .signal-bars .bar:nth-child(4) { height: 30px; }

  /* Battery */
  .battery {
    display: flex;
    align-items: center;
    gap: 1px;
  }
  .battery-body {
    width: 62px;
    height: 30px;
    border: 3px solid currentColor;
    border-radius: 7px;
    position: relative;
    display: flex;
    align-items: center;
    padding: 4px;
  }
  .battery-fill {
    width: 100%;
    height: 100%;
    background: currentColor;
    border-radius: 2px;
  }
  .battery-nub {
    width: 4px;
    height: 12px;
    background: currentColor;
    border-radius: 0 1px 1px 0;
    opacity: 0.5;
  }

  /* Home Indicator */
  .home-indicator {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 335px;
    height: 12px;
    background: rgba(0,0,0,0.3);
    border-radius: 100px;
    z-index: 10;
  }
</style>
</head>
<body>
  <div class="container" id="container">
    <div class="iphone-frame">
      <div class="screen">
        <div class="status-bar" id="statusBar">
          <span class="status-time">9:41</span>
          <div class="status-icons">
            <div class="signal-bars">
              <div class="bar"></div>
              <div class="bar"></div>
              <div class="bar"></div>
              <div class="bar"></div>
            </div>
            <svg width="40" height="30" viewBox="0 0 16 14">
              <path d="M8 10.5a1.5 1.5 0 110 3 1.5 1.5 0 010-3zm-3.5-3C5.5 7.5 6.6 7 8 7s2.5.5 3.5 1.5l-1 1C9.8 8.8 9 8.5 8 8.5s-1.8.3-2.5 1l-1-1zm-3-3C3 3 5.3 2 8 2s5 1 6.5 2.5l-1 1C12.3 4.3 10.3 3.5 8 3.5S3.7 4.3 2.5 5.5l-1-1z" fill="currentColor"/>
            </svg>
            <div class="battery">
              <div class="battery-body"><div class="battery-fill"></div></div>
              <div class="battery-nub"></div>
            </div>
          </div>
        </div>
        <div class="dynamic-island"></div>
        <img id="screenshot" src="" alt="screenshot">
        <div class="home-indicator"></div>
      </div>
    </div>
  </div>
</body>
</html>
