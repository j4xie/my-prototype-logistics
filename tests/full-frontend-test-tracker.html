<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cretas 前端全模块测试跟踪器</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #232733;
    --border: #2e3345;
    --text: #e4e7f1;
    --text2: #8b90a5;
    --accent: #6366f1;
    --accent2: #818cf8;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #eab308;
    --orange: #f97316;
    --blue: #3b82f6;
    --pink: #ec4899;
    --purple: #a855f7;
    --teal: #14b8a6;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg); color: var(--text);
    line-height: 1.6; padding: 0;
  }
  .top-bar {
    position: sticky; top: 0; z-index: 100;
    background: rgba(15,17,23,0.95); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
  }
  .top-bar h1 { font-size: 18px; font-weight: 700; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
  .top-bar h1 span { font-size: 12px; color: var(--text2); font-weight: 400; }
  .progress-row { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
  .progress-bar-wrap { flex: 1; min-width: 200px; height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
  .progress-bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s ease; background: linear-gradient(90deg, var(--accent), var(--green)); }
  .progress-stats { display: flex; gap: 12px; font-size: 13px; flex-wrap: wrap; }
  .stat { display: flex; align-items: center; gap: 4px; }
  .stat .dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot-pass { background: var(--green); }
  .dot-fail { background: var(--red); }
  .dot-skip { background: var(--yellow); }
  .dot-bug { background: var(--pink); }
  .dot-pending { background: var(--text2); }
  .controls { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .filter-btn {
    padding: 3px 10px; border-radius: 6px; border: 1px solid var(--border);
    background: transparent; color: var(--text2); font-size: 11px; cursor: pointer; transition: all 0.2s;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .module-btn {
    padding: 3px 10px; border-radius: 6px; border: 1px solid var(--border);
    background: transparent; color: var(--text2); font-size: 11px; cursor: pointer; transition: all 0.2s;
  }
  .module-btn:hover { border-color: var(--teal); color: var(--teal); }
  .module-btn.active { background: var(--teal); color: #fff; border-color: var(--teal); }
  .export-btn {
    padding: 3px 12px; border-radius: 6px;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); font-size: 11px; cursor: pointer;
  }
  .export-btn:hover { background: var(--accent); color: #fff; }
  .controls-row2 { margin-top: 6px; display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .controls-row2 .label { font-size: 11px; color: var(--text2); margin-right: 4px; }
  .content { padding: 0 24px 80px; }
  .category { margin-top: 16px; }
  .category-header {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 0; cursor: pointer; user-select: none;
    border-bottom: 1px solid var(--border);
  }
  .category-header:hover { opacity: 0.85; }
  .cat-arrow { font-size: 12px; color: var(--text2); transition: transform 0.2s; width: 16px; text-align: center; }
  .cat-arrow.open { transform: rotate(90deg); }
  .cat-title { font-size: 14px; font-weight: 600; }
  .cat-badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; background: var(--surface2); color: var(--text2); }
  .cat-module-badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
  .cat-progress { margin-left: auto; font-size: 12px; color: var(--text2); }
  .category-body { overflow: hidden; }
  .category-body.collapsed { display: none; }
  .tc {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 14px; margin-top: 6px; transition: border-color 0.2s;
  }
  .tc:hover { border-color: var(--accent); }
  .tc.status-pass { border-left: 3px solid var(--green); }
  .tc.status-fail { border-left: 3px solid var(--red); }
  .tc.status-skip { border-left: 3px solid var(--yellow); }
  .tc.status-bug { border-left: 3px solid var(--pink); }
  .tc-head { display: flex; align-items: flex-start; gap: 8px; }
  .tc-id { font-size: 11px; font-weight: 700; color: var(--accent2); min-width: 42px; padding-top: 2px; }
  .tc-main { flex: 1; }
  .tc-title-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .tc-title { font-size: 13px; font-weight: 600; }
  .badge { font-size: 9px; padding: 1px 6px; border-radius: 8px; font-weight: 600; }
  .badge-p0 { background: rgba(239,68,68,0.15); color: var(--red); }
  .badge-p1 { background: rgba(249,115,22,0.15); color: var(--orange); }
  .badge-p2 { background: rgba(59,130,246,0.12); color: var(--blue); }
  .badge-role { background: rgba(168,85,247,0.12); color: var(--purple); }
  .tc-steps { font-size: 11px; color: var(--text2); margin-top: 4px; white-space: pre-line; }
  .tc-expect { font-size: 11px; color: var(--text); margin-top: 3px; padding: 5px 8px; background: var(--surface2); border-radius: 5px; }
  .tc-expect strong { color: var(--accent2); font-weight: 600; }
  .tc-actions { display: flex; gap: 4px; margin-top: 8px; align-items: center; flex-wrap: wrap; }
  .status-btn {
    padding: 2px 8px; border-radius: 4px; border: 1px solid var(--border);
    background: transparent; font-size: 10px; cursor: pointer; color: var(--text2); transition: all 0.15s;
  }
  .status-btn:hover { opacity: 0.8; }
  .status-btn.sel-pass { background: var(--green); color: #fff; border-color: var(--green); }
  .status-btn.sel-fail { background: var(--red); color: #fff; border-color: var(--red); }
  .status-btn.sel-skip { background: var(--yellow); color: #000; border-color: var(--yellow); }
  .status-btn.sel-bug { background: var(--pink); color: #fff; border-color: var(--pink); }
  .tc-notes {
    width: 100%; margin-top: 6px; padding: 5px 8px;
    background: var(--bg); border: 1px solid var(--border); border-radius: 5px;
    color: var(--text); font-size: 11px; resize: vertical; min-height: 24px; font-family: inherit;
  }
  .tc-notes:focus { border-color: var(--accent); outline: none; }
  .tc-notes::placeholder { color: var(--text2); }
  .hidden { display: none !important; }
  .summary-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; padding: 12px 24px; }
  .summary-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; }
  .summary-card h4 { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
  .summary-card .num { font-size: 22px; font-weight: 700; }
  .summary-card .detail { font-size: 11px; color: var(--text2); margin-top: 2px; }
  @media (max-width: 640px) {
    .top-bar { padding: 10px 12px; }
    .content { padding: 0 12px 60px; }
    .summary-grid { padding: 8px 12px; grid-template-columns: repeat(2, 1fr); }
  }
  @media print {
    body { background: #fff; color: #000; }
    .top-bar { position: static; background: #fff; }
    .controls, .controls-row2, .status-btn, .export-btn { display: none; }
    .tc { border: 1px solid #ccc; page-break-inside: avoid; }
  }
</style>
</head>
<body>

<div class="top-bar">
  <h1>
    Cretas 前端全模块测试跟踪器
    <span>v3.0 · <span id="totalCount">0</span> 用例 · 11 模块</span>
  </h1>
  <div class="progress-row">
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressBar" style="width:0%"></div></div>
    <div class="progress-stats" id="statsDisplay">
      <span class="stat"><span class="dot dot-pass"></span> 通过 <b id="cntPass">0</b></span>
      <span class="stat"><span class="dot dot-fail"></span> 失败 <b id="cntFail">0</b></span>
      <span class="stat"><span class="dot dot-bug"></span> Bug <b id="cntBug">0</b></span>
      <span class="stat"><span class="dot dot-skip"></span> 跳过 <b id="cntSkip">0</b></span>
      <span class="stat"><span class="dot dot-pending"></span> 待测 <b id="cntPending">0</b></span>
    </div>
  </div>
  <div class="controls">
    <button class="filter-btn active" data-filter="all">全部</button>
    <button class="filter-btn" data-filter="pending">待测</button>
    <button class="filter-btn" data-filter="pass">通过</button>
    <button class="filter-btn" data-filter="fail">失败</button>
    <button class="filter-btn" data-filter="bug">Bug</button>
    <button class="filter-btn" data-filter="p0">仅P0</button>
    <button class="export-btn" onclick="exportResults()">导出TSV</button>
    <button class="export-btn" onclick="resetAll()">重置</button>
  </div>
  <div class="controls-row2">
    <span class="label">模块筛选:</span>
    <button class="module-btn active" data-module="all">全部</button>
    <button class="module-btn" data-module="WR">报工</button>
    <button class="module-btn" data-module="PO">采购</button>
    <button class="module-btn" data-module="SO">销售</button>
    <button class="module-btn" data-module="TR">调拨</button>
    <button class="module-btn" data-module="RO">退货</button>
    <button class="module-btn" data-module="FIN">财务</button>
    <button class="module-btn" data-module="WAG">工资</button>
    <button class="module-btn" data-module="HOM">首页</button>
    <button class="module-btn" data-module="SET">设置</button>
    <button class="module-btn" data-module="AI">AI</button>
  </div>
</div>

<div class="summary-grid" id="summaryGrid"></div>
<div class="content" id="testContent"></div>

<script>
const MODULE_COLORS = {
  WR: '#6366f1', PO: '#f97316', SO: '#22c55e', TR: '#3b82f6',
  RO: '#ec4899', FIN: '#eab308', WAG: '#a855f7', HOM: '#14b8a6',
  SET: '#8b90a5', AI: '#06b6d4', USR: '#f43f5e'
};

const TEST_DATA = [
  // ==================== 报工模块 (WR) ====================
  {
    category: "报工 — 正向流程",
    module: "WR",
    cases: [
      { id:"WR-01", title:"班组报工 — 选批次+填成员产量(含良品/不良品)", p:"P0", role:"workshop_sup1",
        steps:"1. 首页点「班组报工」\n2. 只显示分配给当前主管的批次\n3. 选 IN_PROGRESS 批次\n4. 展开工人卡片填良品/不良品(默认折叠)\n5. 为至少1名工人填产出\n6. 点「一键提交」",
        expect:"Alert「N人的报工已提交」" },
      { id:"WR-02", title:"班组报工 — 手动添加成员", p:"P1", role:"workshop_sup1",
        steps:"选择批次后点「+ 添加成员」，填写新成员产出",
        expect:"成员列表新增一行，计入提交人数" },
      { id:"WR-03", title:"班组报工 — 更换批次", p:"P1", role:"workshop_sup1",
        steps:"已选批次后点击「更换」",
        expect:"返回批次列表，成员列表清空" },
      { id:"WR-04", title:"工时报工 (HOURS) — 填工时明细提交", p:"P0", role:"workshop_sup1",
        steps:"1. 首页点「工时上报」\n2. 商品名称「香酥鱼柳」\n3. 正式工5人8h、小时工2人4h\n4. 提交",
        expect:"Alert「报工提交成功」，记录7人工时" },
      { id:"WR-05", title:"工时上报入口存在", p:"P0", role:"workshop_sup1",
        steps:"登录 → 浏览首页快捷操作区",
        expect:"存在「工时上报」按钮（clock-outline 图标，红色背景），点击导航到 DynamicReport(HOURS)" },
      { id:"WR-06", title:"我的报工入口存在", p:"P0", role:"workshop_sup1",
        steps:"登录 → 浏览首页快捷操作区",
        expect:"存在「我的报工」按钮（clipboard-text-clock-outline，绿色背景），点击导航到 MyWorkReports" },
      { id:"WR-07", title:"签到 — QR扫码签到(含supervisorId过滤+单批次自动选中)", p:"P0", role:"workshop_sup1",
        steps:"1. 进入签到页，只显示分配给当前主管的批次\n2. 若仅1个批次则自动选中跳过选择\n3. QR扫码Tab → 扫码签到",
        expect:"Alert「签到成功」，签到列表新增一行" },
      { id:"WR-13", title:"签退 — 对已签到员工签退", p:"P0", role:"workshop_sup1",
        steps:"签到页找到「工作中」员工 → 点「签退」",
        expect:"Alert「签退成功」，状态变「已签退」" },
      { id:"WR-14", title:"草稿管理 — 有草稿时查看", p:"P1", role:"workshop_sup1",
        steps:"首页点「草稿管理」（此前有离线草稿）",
        expect:"显示草稿列表，有批次号、产出、时间" },
      { id:"WR-15", title:"草稿管理 — 重新提交草稿", p:"P1", role:"workshop_sup1",
        steps:"网络恢复后在草稿列表点「重新提交」",
        expect:"Alert「已同步」，草稿从列表移除" },
    ]
  },
  {
    category: "报工 — 我的报工历史",
    module: "WR",
    cases: [
      { id:"WR-20", title:"初始加载显示全部记录", p:"P0", role:"workshop_sup1",
        steps:"导航到「我的报工」→ 等待加载",
        expect:"FlatList 渲染报工卡片，每条显示日期/类型Chip/状态Chip" },
      { id:"WR-21", title:"状态过滤「待审批」", p:"P1", role:"workshop_sup1",
        steps:"点击「待审批」Tab",
        expect:"仅显示 SUBMITTED 记录" },
      { id:"WR-22", title:"状态过滤「已批准」", p:"P1", role:"workshop_sup1",
        steps:"点击「已批准」Tab",
        expect:"仅显示 APPROVED 记录" },
      { id:"WR-23", title:"状态过滤「已拒绝」", p:"P1", role:"workshop_sup1",
        steps:"点击「已拒绝」Tab",
        expect:"仅显示 REJECTED 记录" },
      { id:"WR-24", title:"已拒绝记录显示拒绝原因", p:"P0", role:"workshop_sup1",
        steps:"点击「已拒绝」Tab → 查看被拒记录",
        expect:"卡片底部红色背景「拒绝原因」区块，内含拒绝文字" },
      { id:"WR-25", title:"HOURS 类型记录展示工时/人数", p:"P1", role:"workshop_sup1",
        steps:"在列表中找到 HOURS 类型记录",
        expect:"显示「总工时 X 小时」和「工人数 X 人」，不显示产量/良品" },
      { id:"WR-26", title:"PROGRESS 类型记录展示产量", p:"P1", role:"workshop_sup1",
        steps:"在列表中找到 PROGRESS 类型记录",
        expect:"显示产量/良品，若缺陷>0则红色显示，不显示工时" },
      { id:"WR-27", title:"空列表状态", p:"P1", role:"workshop_sup1",
        steps:"切到某状态Tab且无数据",
        expect:"显示「暂无报工记录」" },
      { id:"WR-28", title:"下拉刷新", p:"P2", role:"workshop_sup1",
        steps:"列表页下拉",
        expect:"RefreshControl 出现，数据重新加载" },
    ]
  },
  {
    category: "报工 — 审批 (factory_admin)",
    module: "WR",
    cases: [
      { id:"WR-30", title:"审批页加载所有类型报工", p:"P0", role:"factory_admin1",
        steps:"管理Tab → 报工审批 → 等待加载",
        expect:"待审批列表包含 PROGRESS 和 HOURS 两种类型报工（无 type 写死）" },
      { id:"WR-31", title:"状态筛选 — 仅待审批", p:"P1", role:"factory_admin1",
        steps:"点状态筛选「待审批」",
        expect:"仅显示 SUBMITTED 记录" },
      { id:"WR-32", title:"状态筛选 — 已批准Tab", p:"P1", role:"factory_admin1",
        steps:"点「已批准」Tab",
        expect:"显示 APPROVED 记录，无批准/拒绝按钮" },
      { id:"WR-33", title:"状态筛选 — 全部", p:"P1", role:"factory_admin1",
        steps:"点「全部」Tab",
        expect:"显示所有状态 (SUBMITTED + APPROVED + REJECTED)" },
      { id:"WR-34", title:"类型筛选 — 仅工时", p:"P1", role:"factory_admin1",
        steps:"点击类型筛选行「工时」",
        expect:"列表仅显示 reportType=HOURS 的记录" },
      { id:"WR-35", title:"类型筛选 — 仅进度", p:"P1", role:"factory_admin1",
        steps:"点击类型筛选行「进度」",
        expect:"列表仅显示 reportType=PROGRESS 的记录" },
      { id:"WR-36", title:"类型 Chip 标识", p:"P1", role:"factory_admin1",
        steps:"查看任意报工卡片",
        expect:"卡片显示蓝色「进度」或紫色「工时」类型 Chip" },
      { id:"WR-37", title:"批准 HOURS 类型报工", p:"P0", role:"factory_admin1",
        steps:"找到 HOURS 记录 → 点「批准」→ 确认",
        expect:"Alert「已批准」，记录从待审批消失" },
      { id:"WR-38", title:"批准 PROGRESS 类型报工", p:"P0", role:"factory_admin1",
        steps:"找到 PROGRESS 记录 → 点「批准」→ 确认",
        expect:"Alert「已批准」，记录从待审批消失" },
      { id:"WR-39", title:"拒绝报工并填原因", p:"P0", role:"factory_admin1",
        steps:"点「拒绝」→ Modal 填「产量数据有误」→ 确认拒绝",
        expect:"Alert「已拒绝」，Modal 关闭" },
      { id:"WR-3A", title:"拒绝原因仅空格时按钮 disabled", p:"P0", role:"factory_admin1",
        steps:"Modal 输入若干空格",
        expect:"确认按钮保持 disabled（trim()为空）" },
      { id:"WR-3B", title:"拒绝原因达500字符", p:"P2", role:"factory_admin1",
        steps:"输入恰好500字符",
        expect:"字符计数 500/500，超出被截断" },
      { id:"WR-3C", title:"批准操作取消确认", p:"P1", role:"factory_admin1",
        steps:"点「批准」→ 弹框中点「取消」",
        expect:"弹框关闭，状态不变" },
      { id:"WR-3D", title:"关闭拒绝 Modal（点X）", p:"P2", role:"factory_admin1",
        steps:"拒绝 Modal 打开时点右上角关闭",
        expect:"Modal 关闭，rejectReason 清空" },
      { id:"WR-3E", title:"HOURS 卡片显示工时字段", p:"P1", role:"factory_admin1",
        steps:"在列表中查看 HOURS 类型卡片",
        expect:"显示「总工时」和「工人数」，不显示产量/良品/不良品" },
      { id:"WR-3F", title:"审批列表初始加载 loading", p:"P1", role:"factory_admin1",
        steps:"进入报工审批页面",
        expect:"显示 ActivityIndicator" },
      { id:"WR-3G", title:"审批列表空状态", p:"P1", role:"factory_admin1",
        steps:"切换到某Tab且无数据",
        expect:"显示「暂无报工记录」" },
      { id:"WR-3H", title:"审批列表下拉刷新", p:"P1", role:"factory_admin1",
        steps:"在审批列表向下拉",
        expect:"RefreshControl 触发，数据重新加载" },
      { id:"WR-3I", title:"审批页刷新按钮", p:"P2", role:"factory_admin1",
        steps:"点击 Appbar 右上角刷新图标",
        expect:"等同下拉刷新，列表重新加载" },
    ]
  },
  {
    category: "报工 — 多角色交叉",
    module: "WR",
    cases: [
      { id:"WR-40", title:"主管提交 → 管理员批准 → 主管看状态", p:"P0", role:"multi",
        steps:"1. workshop_sup1 扫码报工提交\n2. factory_admin1 审批页批准\n3. workshop_sup1 → 我的报工 → 已批准Tab",
        expect:"该报工出现在已批准列表中" },
      { id:"WR-41", title:"管理员拒绝 → 主管看到原因", p:"P0", role:"multi",
        steps:"1. factory_admin1 拒绝并填原因\n2. workshop_sup1 → 我的报工 → 已拒绝Tab",

// ===== State =====
const STORAGE_KEY = 'cretas-full-test-v3';
let state = {};
let currentFilter = 'all';
let currentModule = 'all';

function loadState() {
  try { state = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch { state = {}; }
}
function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function getTC(id) { return state[id] || { status: 'pending', notes: '' }; }
function setTC(id, key, val) {
  if (!state[id]) state[id] = { status: 'pending', notes: '' };
  state[id][key] = val;
  saveState();
  render();
}

// ===== Render =====
function render() {
  const container = document.getElementById('testContent');
  let html = '';
  let total = 0, pass = 0, fail = 0, skip = 0, bug = 0, pending = 0;
  const moduleStats = {};

  for (const cat of TEST_DATA) {
    if (!moduleStats[cat.module]) moduleStats[cat.module] = { total: 0, pass: 0, fail: 0, bug: 0 };
    let catPass = 0, catTotal = 0, casesHtml = '', anyVisible = false;

    for (const tc of cat.cases) {
      const s = getTC(tc.id);
      total++; catTotal++;
      moduleStats[cat.module].total++;
      if (s.status === 'pass') { pass++; catPass++; moduleStats[cat.module].pass++; }
      else if (s.status === 'fail') { fail++; moduleStats[cat.module].fail++; }
      else if (s.status === 'skip') skip++;
      else if (s.status === 'bug') { bug++; moduleStats[cat.module].bug++; }
      else pending++;

      let visible = true;
      if (currentFilter === 'pending' && s.status !== 'pending') visible = false;
      if (currentFilter === 'pass' && s.status !== 'pass') visible = false;
      if (currentFilter === 'fail' && s.status !== 'fail') visible = false;
      if (currentFilter === 'bug' && s.status !== 'bug') visible = false;
      if (currentFilter === 'skip' && s.status !== 'skip') visible = false;
      if (currentFilter === 'p0' && tc.p !== 'P0') visible = false;
      if (currentModule !== 'all' && cat.module !== currentModule) visible = false;
      if (visible) anyVisible = true;

      const pClass = tc.p === 'P0' ? 'badge-p0' : tc.p === 'P1' ? 'badge-p1' : 'badge-p2';
      const roleBadge = tc.role ? `<span class="badge badge-role">${tc.role}</span>` : '';

      casesHtml += `
        <div class="tc status-${s.status} ${visible ? '' : 'hidden'}" id="tc-${tc.id}">
          <div class="tc-head">
            <div class="tc-id">${tc.id}</div>
            <div class="tc-main">
              <div class="tc-title-row">
                <span class="tc-title">${tc.title}</span>
                <span class="badge ${pClass}">${tc.p}</span>
                ${roleBadge}
              </div>
              <div class="tc-steps">${tc.steps}</div>
              <div class="tc-expect"><strong>预期:</strong> ${tc.expect}</div>
              <div class="tc-actions">
                <button class="status-btn ${s.status==='pass'?'sel-pass':''}" onclick="setTC('${tc.id}','status','pass')">通过</button>
                <button class="status-btn ${s.status==='fail'?'sel-fail':''}" onclick="setTC('${tc.id}','status','fail')">失败</button>
                <button class="status-btn ${s.status==='bug'?'sel-bug':''}" onclick="setTC('${tc.id}','status','bug')">Bug</button>
                <button class="status-btn ${s.status==='skip'?'sel-skip':''}" onclick="setTC('${tc.id}','status','skip')">跳过</button>
                <button class="status-btn" onclick="setTC('${tc.id}','status','pending')">重置</button>
              </div>
              <textarea class="tc-notes" placeholder="备注..." rows="1"
                oninput="setTC('${tc.id}','notes',this.value)">${s.notes || ''}</textarea>
            </div>
          </div>
        </div>`;
    }

    const moduleColor = MODULE_COLORS[cat.module] || '#8b90a5';
    const catVisible = currentModule === 'all' || cat.module === currentModule;

    html += `
      <div class="category ${(anyVisible && catVisible) ? '' : 'hidden'}">
        <div class="category-header" onclick="toggleCat(this)">
          <span class="cat-arrow open">&#9654;</span>
          <span class="cat-title">${cat.category}</span>
          <span class="cat-module-badge" style="background:${moduleColor}20;color:${moduleColor}">${cat.module}</span>
          <span class="cat-badge">${catTotal}条</span>
          <span class="cat-progress">${catPass}/${catTotal}</span>
        </div>
        <div class="category-body">${casesHtml}</div>
      </div>`;
  }

  container.innerHTML = html;

  // Stats
  document.getElementById('cntPass').textContent = pass;
  document.getElementById('cntFail').textContent = fail;
  document.getElementById('cntBug').textContent = bug;
  document.getElementById('cntSkip').textContent = skip;
  document.getElementById('cntPending').textContent = pending;
  document.getElementById('totalCount').textContent = total;
  const pct = total > 0 ? Math.round((pass + fail + bug + skip) / total * 100) : 0;
  document.getElementById('progressBar').style.width = pct + '%';

  // Module summary cards
  const grid = document.getElementById('summaryGrid');
  const moduleNames = { WR:'报工', PO:'采购', SO:'销售', TR:'调拨', RO:'退货', FIN:'财务', WAG:'工资', HOM:'首页', SET:'设置', AI:'AI' };
  let summaryHtml = '';
  for (const [mod, stats] of Object.entries(moduleStats)) {
    const color = MODULE_COLORS[mod] || '#8b90a5';
    const pctM = stats.total > 0 ? Math.round(stats.pass / stats.total * 100) : 0;
    summaryHtml += `
      <div class="summary-card" style="border-left:3px solid ${color}">
        <h4>${moduleNames[mod] || mod}</h4>
        <div class="num" style="color:${color}">${stats.pass}/${stats.total}</div>
        <div class="detail">${pctM}% 通过${stats.fail > 0 ? ' · '+stats.fail+'失败' : ''}${stats.bug > 0 ? ' · '+stats.bug+'bug' : ''}</div>
      </div>`;
  }
  grid.innerHTML = summaryHtml;
}

function toggleCat(header) {
  const body = header.nextElementSibling;
  const arrow = header.querySelector('.cat-arrow');
  body.classList.toggle('collapsed');
  arrow.classList.toggle('open');
}

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    render();
  });
});

// Module buttons
document.querySelectorAll('.module-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.module-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentModule = btn.dataset.module;
    render();
  });
});

function exportResults() {
  let lines = ['ID\t模块\t状态\t优先级\t角色\t标题\t备注'];
  for (const cat of TEST_DATA) {
    for (const tc of cat.cases) {
      const s = getTC(tc.id);
      lines.push(`${tc.id}\t${cat.module}\t${s.status}\t${tc.p}\t${tc.role||''}\t${tc.title}\t${(s.notes||'').replace(/\n/g,' ')}`);
    }
  }
  const blob = new Blob([lines.join('\n')], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `cretas-test-${new Date().toISOString().slice(0,10)}.tsv`;
  a.click(); URL.revokeObjectURL(url);
}

function resetAll() {
  if (confirm('确定重置所有测试状态？此操作不可撤销。')) {
    state = {};
    saveState();
    render();
  }
}

// Init
loadState();
render();
</script>
</body>
</html>
