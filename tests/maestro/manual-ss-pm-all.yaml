appId: com.cretas.foodtrace
---
# Manual Screenshots: Procurement Manager - Full Coverage
# Captures: home dashboard, purchase orders, return orders, price list, suppliers, profile
# Role: procurement_mgr1 (采购经理)
# Tabs: 首页 | 采购 | 供应商 | 我的

- launchApp:
    clearState: true

- extendedWaitUntil:
    visible: ".*Login.*|.*Cretas.*|.*Register.*"
    timeout: 30000
- waitForAnimationToEnd
- waitForAnimationToEnd

- tapOn: "Login"
- waitForAnimationToEnd
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: ".*Enter username.*|.*Username.*"
    timeout: 10000

- tapOn:
    id: "login-username-input"
- eraseText: 30
- inputText: "procurement_mgr1"
- hideKeyboard
- waitForAnimationToEnd

- tapOn:
    id: "login-password-input"
- eraseText: 30
- inputText: "123456"
- hideKeyboard
- waitForAnimationToEnd

- tapOn:
    id: "login-submit-btn"

- extendedWaitUntil:
    visible: "OK"
    timeout: 35000
- tapOn: "OK"
- waitForAnimationToEnd
- waitForAnimationToEnd

# Dismiss Location Accuracy dialog if it appears
- tapOn:
    text: "No thanks"
    optional: true
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: ".*Welcome.*|.*Good.*|.*\u91C7\u8D2D.*|\u52A0\u8F7D\u5931\u8D25.*|\u9996\u9875.*"
    timeout: 15000
- waitForAnimationToEnd

# ============================================================
# TAB 1: 首页 (Home) - already on this tab after login
# ============================================================

# Screenshot: Procurement home dashboard (stat cards, KPIs)
- takeScreenshot: screenshots/manual-ss-pm-home-top

# Scroll down to see quick actions and recent activity
- swipe:
    direction: UP
    duration: 600
- waitForAnimationToEnd
- takeScreenshot: screenshots/manual-ss-pm-home-scroll

# Scroll back to top
- swipe:
    direction: UP
    duration: 1000
- waitForAnimationToEnd

# ============================================================
# TAB 2: 采购 (Purchase Orders) - 2nd tab, 35% from left
# ============================================================

- tapOn:
    point: "35%,97%"
- waitForAnimationToEnd
- waitForAnimationToEnd

# Screenshot: Purchase order list
- takeScreenshot: screenshots/manual-ss-pm-purchase-list

# Scroll down to see more purchase orders
- swipe:
    direction: UP
    duration: 600
- waitForAnimationToEnd
- takeScreenshot: screenshots/manual-ss-pm-purchase-list-scroll

# Scroll back to top
- swipe:
    direction: UP
    duration: 800
- waitForAnimationToEnd

# Tap on first purchase order for detail
- tapOn:
    text: ".*\u91C7\u8D2D\u5355.*|.*PO-.*|.*\u8BA2\u5355.*|.*pending.*|\u5F85\u5BA1\u6838.*|\u5DF2\u5BA1\u6838.*|\u5DF2\u5B8C\u6210.*"
    optional: true
    index: 0
- waitForAnimationToEnd
- takeScreenshot: screenshots/manual-ss-pm-purchase-detail

# Scroll in purchase order detail
- swipe:
    direction: UP
    duration: 500
- waitForAnimationToEnd
- takeScreenshot: screenshots/manual-ss-pm-purchase-detail-scroll

# Recovery back to purchase tab
- back
- waitForAnimationToEnd
- launchApp
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: ".*\u91C7\u8D2D.*|.*\u9996\u9875.*|.*\u4F9B\u5E94\u5546.*"
    timeout: 10000
- waitForAnimationToEnd

# Navigate back to purchase tab
- tapOn:
    point: "35%,97%"
- waitForAnimationToEnd
- waitForAnimationToEnd

# Tap Return Orders tab/section (退货/Return)
- tapOn:
    text: ".*\u9000\u8D27.*|.*Return.*|.*\u9000\u8D27\u7533\u8BF7.*"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: screenshots/manual-ss-pm-return-orders

# Scroll in return orders
- swipe:
    direction: UP
    duration: 500
- waitForAnimationToEnd
- takeScreenshot: screenshots/manual-ss-pm-return-orders-scroll

# Recovery
- back
- waitForAnimationToEnd
- launchApp
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: ".*\u91C7\u8D2D.*|.*\u9996\u9875.*|.*\u4F9B\u5E94\u5546.*"
    timeout: 10000
- waitForAnimationToEnd

# Navigate back to purchase tab
- tapOn:
    point: "35%,97%"
- waitForAnimationToEnd
- waitForAnimationToEnd

# Tap Price List tab/section (价目/Price)
- tapOn:
    text: ".*\u4EF7\u76EE.*|.*Price.*|.*\u4EF7\u683C\u8868.*|.*\u62A5\u4EF7.*"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: screenshots/manual-ss-pm-price-list

# Scroll in price list
- swipe:
    direction: UP
    duration: 500
- waitForAnimationToEnd
- takeScreenshot: screenshots/manual-ss-pm-price-list-scroll

# Recovery
- back
- waitForAnimationToEnd
- launchApp
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: ".*\u91C7\u8D2D.*|.*\u9996\u9875.*|.*\u4F9B\u5E94\u5546.*"
    timeout: 10000
- waitForAnimationToEnd

# ============================================================
# TAB 3: 供应商 (Suppliers) - 3rd tab, 65% from left
# ============================================================

- tapOn:
    point: "65%,97%"
- waitForAnimationToEnd
- waitForAnimationToEnd

# Screenshot: Supplier list
- takeScreenshot: screenshots/manual-ss-pm-supplier-list

# Scroll down to see more suppliers
- swipe:
    direction: UP
    duration: 600
- waitForAnimationToEnd
- takeScreenshot: screenshots/manual-ss-pm-supplier-list-scroll

# Scroll back to top
- swipe:
    direction: UP
    duration: 800
- waitForAnimationToEnd

# Tap on first supplier for detail
- tapOn:
    text: ".*\u4F9B\u5E94\u5546.*|.*Supplier.*|.*\u516C\u53F8.*|.*\u6709\u9650\u516C\u53F8.*"
    optional: true
    index: 0
- waitForAnimationToEnd
- takeScreenshot: screenshots/manual-ss-pm-supplier-detail

# Scroll in supplier detail
- swipe:
    direction: UP
    duration: 500
- waitForAnimationToEnd
- takeScreenshot: screenshots/manual-ss-pm-supplier-detail-scroll

# Recovery
- back
- waitForAnimationToEnd
- launchApp
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: ".*\u91C7\u8D2D.*|.*\u9996\u9875.*|.*\u4F9B\u5E94\u5546.*"
    timeout: 10000
- waitForAnimationToEnd

# ============================================================
# TAB 4: 我的 (Profile) - 4th tab, 90% from left
# ============================================================

- tapOn:
    point: "90%,97%"
- waitForAnimationToEnd
- waitForAnimationToEnd

# Screenshot: Profile / My page
- takeScreenshot: screenshots/manual-ss-pm-profile

# Scroll down in profile
- swipe:
    direction: UP
    duration: 600
- waitForAnimationToEnd
- takeScreenshot: screenshots/manual-ss-pm-profile-scroll

# Final completion screenshot
- back
- waitForAnimationToEnd
- launchApp
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: ".*\u91C7\u8D2D.*|.*\u9996\u9875.*|.*\u4F9B\u5E94\u5546.*"
    timeout: 10000
- waitForAnimationToEnd
- takeScreenshot: screenshots/manual-ss-pm-complete
