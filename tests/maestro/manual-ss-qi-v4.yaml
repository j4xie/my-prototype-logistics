appId: com.cretas.foodtrace
---
# QI Quality Inspector screenshots - v4
# QI has 5 tabs: 首页(10%), 质检(30%), 记录(50%), 分析(70%), 我的(90%)
#
# CRITICAL FIX: QI Home screen has a "Quick Actions" row (Scan QR, Voice Input,
# Records, Analysis) sitting ABOVE the tab bar. Tapping at y=97-99% from the
# home screen hits Quick Actions instead of the tab bar.
#
# SOLUTION: After capturing home screenshots, go to 质检 tab (which has NO
# Quick Actions overlay) and navigate to all other tabs FROM THERE.
# The inspect list screen only has a batch list + tab bar at bottom.

- launchApp:
    clearState: true
- extendedWaitUntil:
    visible: ".*Login.*|.*Cretas.*|.*Register.*"
    timeout: 30000
- waitForAnimationToEnd
- waitForAnimationToEnd
- tapOn: "Login"
- waitForAnimationToEnd
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: ".*Enter username.*|.*Username.*"
    timeout: 10000
- tapOn:
    id: "login-username-input"
- eraseText: 30
- inputText: "quality_insp1"
- tapOn:
    id: "login-password-input"
- eraseText: 30
- inputText: "123456"
- hideKeyboard
- waitForAnimationToEnd
- tapOn:
    id: "login-submit-btn"
- extendedWaitUntil:
    visible: "OK"
    timeout: 60000
- tapOn: "OK"
- waitForAnimationToEnd
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: ".*Welcome.*|.*Good.*|.*Pending.*|.*Working.*"
    timeout: 15000
- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd

# ============================================================
# 1. QI Home (首页 tab) — already here after login
# ============================================================
- takeScreenshot: screenshots/by-role/qi/manual-ss-qi-home

- swipe:
    direction: UP
    duration: 600
- waitForAnimationToEnd
- takeScreenshot: screenshots/by-role/qi/manual-ss-qi-home-scroll

- swipe:
    direction: DOWN
    duration: 600
- waitForAnimationToEnd

# ============================================================
# 2. 质检 Tab (30%) - Inspect List
#    Navigate here FIRST — this screen has NO Quick Actions overlay,
#    so all subsequent tab taps will reliably hit the tab bar.
# ============================================================
- tapOn:
    point: "30%,99%"
- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd

- takeScreenshot: screenshots/by-role/qi/manual-ss-qi-inspect-list

- swipe:
    direction: UP
    duration: 600
- waitForAnimationToEnd
- takeScreenshot: screenshots/by-role/qi/manual-ss-qi-inspect-list-scroll

- swipe:
    direction: DOWN
    duration: 600
- waitForAnimationToEnd

# ============================================================
# 3. 记录 Tab (50%) - Records
#    Tapping FROM the inspect list screen (no Quick Actions)
# ============================================================
- tapOn:
    point: "50%,99%"
- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd

- takeScreenshot: screenshots/by-role/qi/manual-ss-qi-records

- swipe:
    direction: UP
    duration: 600
- waitForAnimationToEnd
- takeScreenshot: screenshots/by-role/qi/manual-ss-qi-records-scroll

- swipe:
    direction: DOWN
    duration: 600
- waitForAnimationToEnd

# ============================================================
# 4. 分析 Tab (70%) - Analysis
#    Tapping FROM the records screen (also no Quick Actions)
# ============================================================
- tapOn:
    point: "70%,99%"
- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd

- takeScreenshot: screenshots/by-role/qi/manual-ss-qi-analysis

- swipe:
    direction: UP
    duration: 600
- waitForAnimationToEnd
- takeScreenshot: screenshots/by-role/qi/manual-ss-qi-analysis-scroll

- swipe:
    direction: DOWN
    duration: 600
- waitForAnimationToEnd

# ============================================================
# 5. 我的 Tab (90%) - Profile
#    Tapping FROM the analysis screen (also no Quick Actions)
# ============================================================
- tapOn:
    point: "90%,99%"
- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd

- takeScreenshot: screenshots/by-role/qi/manual-ss-qi-profile

- swipe:
    direction: UP
    duration: 500
- waitForAnimationToEnd
- takeScreenshot: screenshots/by-role/qi/manual-ss-qi-profile-scroll

# Final: back to home tab (from profile, no Quick Actions issue)
- tapOn:
    point: "10%,99%"
- waitForAnimationToEnd
- waitForAnimationToEnd
- takeScreenshot: screenshots/by-role/qi/manual-ss-qi-complete
