- extendedWaitUntil:
    visible: ".*HR.*|.*\u9996\u9875.*|.*\u4EBA\u529B.*"
    timeout: 10000
- waitForAnimationToEnd

# Navigate back to Profile tab
- tapOn:
    point: "90%,97%"
- waitForAnimationToEnd

# Tap My Attendance (我的考勤)
- tapOn:
    text: ".*\u6211\u7684\u8003\u52E4.*|.*My.*Attendance.*"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: screenshots/manual-ss-hr-my-attendance

