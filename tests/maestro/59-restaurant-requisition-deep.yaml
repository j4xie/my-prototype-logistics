appId: com.cretas.foodtrace
---
# Test 59: Restaurant Requisition Deep Navigation
# Verifies RequisitionCreate form labels, type toggle, and sub-screen access
# Phase A: Deep navigation into requisition module

- launchApp:
    clearState: true
- waitForAnimationToEnd

# Login as restaurant admin
- runFlow: flows/login-restaurant.yaml
- extendedWaitUntil:
    visible: ".*AI Insights.*|.*AI 智能洞察.*|.*Today.*Overview.*|.*首页.*"
    timeout: 15000

# Navigate to 管理 tab first, then 领料 (Requisition) sub-section
- takeScreenshot: screenshots/59-pre-tab
- tapOn:
    text: ".*Management.*|.*Manage.*|.*管理.*"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: ".*Requisition.*|.*领料.*"
    optional: true
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: ".*领料.*|.*Requisition.*|.*按配方.*|.*手动.*|.*管理.*"
    timeout: 5000
- takeScreenshot: screenshots/59-requisition-create

# === Verify type toggle: 按配方领料 / 手动领料 ===
- tapOn:
    text: ".*By Recipe.*|.*Production.*|.*按配方领料.*"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: screenshots/59-type-production

- tapOn:
    text: ".*Manual.*|.*手动领料.*"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: screenshots/59-type-manual

# Switch back to production type
- tapOn:
    text: ".*By Recipe.*|.*Production.*|.*按配方领料.*"
    optional: true
- waitForAnimationToEnd

# === Verify form fields exist ===
- tapOn:
    text: ".*Select Dish.*|.*选择菜品.*"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: screenshots/59-select-dish

# Back from any picker
- back
- waitForAnimationToEnd

- tapOn:
    text: ".*Quantity.*|.*申请数量.*|.*数量.*"
    optional: true
- waitForAnimationToEnd

- tapOn:
    text: ".*Notes.*|.*备注.*"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: screenshots/59-form-fields

# Scroll to see buttons
- swipe:
    direction: UP
    duration: 500
- waitForAnimationToEnd

# Check for save/submit buttons
- tapOn:
    text: ".*Save Draft.*|.*保存草稿.*"
    optional: true
- takeScreenshot: screenshots/59-buttons-visible

# Back out
- back
- waitForAnimationToEnd

# Recovery and return to home
- launchApp
- waitForAnimationToEnd
- tapOn:
    text: ".*Home.*|.*首页.*"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: screenshots/59-complete
