appId: com.cretas.foodtrace
---
# Login as quality inspector (quality_insp1)
# Dismiss any system dialogs
- tapOn:
    text: "Wait"
    optional: true
- tapOn:
    text: "Close app"
    optional: true
- tapOn:
    text: "OK"
    optional: true
- extendedWaitUntil:
    visible: ".*Login.*|.*Cretas.*"
    timeout: 20000
- tapOn: "Login"
- waitForAnimationToEnd
- tapOn: "Enter username"
- inputText: "quality_insp1"
- hideKeyboard
- waitForAnimationToEnd
- tapOn: "Enter password"
- inputText: "123456"
- hideKeyboard
- waitForAnimationToEnd
# Dismiss any mid-login system dialogs
- tapOn:
    text: "Wait"
    optional: true
- tapOn:
    text: "Close app"
    optional: true
- tapOn:
    text: "Login"
    index: 1
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "OK"
    timeout: 60000
- tapOn: "OK"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: ".*检验.*|.*Quality.*|.*Records.*|.*待检验.*"
    timeout: 10000
