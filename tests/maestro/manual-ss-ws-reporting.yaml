appId: com.cretas.foodtrace
---
# Manual Screenshots: Workshop Supervisor - Reporting Main Flow
# Captures: home dashboard, next task card, task guide, NFC checkin, team reporting

- launchApp:
    clearState: true
- waitForAnimationToEnd

# Login as workshop supervisor
- runFlow: flows/login-ws.yaml
- waitForAnimationToEnd

# Wait for home to fully load
- extendedWaitUntil:
    visible: ".*Start Task.*|.*\u5F00\u59CB\u4EFB\u52A1.*"
    timeout: 15000
- waitForAnimationToEnd

# Screenshot: Workshop supervisor home (full dashboard)
- takeScreenshot: screenshots/manual-ss-ws-home

# Scroll down to see more of dashboard
- swipe:
    direction: UP
    duration: 600
- waitForAnimationToEnd
- takeScreenshot: screenshots/manual-ss-ws-home-scroll

# Scroll back
- swipe:
    direction: DOWN
    duration: 600
- waitForAnimationToEnd

# Screenshot: Next task card (should be visible on home)
- takeScreenshot: screenshots/manual-ss-ws-next-task

# Tap "Start Task" / "开始任务" to enter task guide
- tapOn:
    text: ".*Start Task.*|.*\u5F00\u59CB\u4EFB\u52A1.*"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: screenshots/manual-ss-ws-task-guide-step1

# Step 1: Arrive at workstation - tap confirm
- tapOn:
    text: ".*\u6211\u5DF2\u5230\u8FBE\u5DE5\u4F4D.*|.*Arrived.*|.*\u4E0B\u4E00\u6B65.*|.*Next.*"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: screenshots/manual-ss-ws-task-guide-step2

# Step 2: Confirm equipment
- tapOn:
    text: ".*\u542F\u52A8\u8BBE\u5907.*|.*Start Equipment.*|.*\u4E0B\u4E00\u6B65.*|.*Next.*|.*\u786E\u8BA4.*"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: screenshots/manual-ss-ws-task-guide-step3

# Recovery from task guide
- back
- waitForAnimationToEnd
- back
- waitForAnimationToEnd
- launchApp
- waitForAnimationToEnd

# Wait for home again
- extendedWaitUntil:
    visible: ".*Start Task.*|.*\u5F00\u59CB\u4EFB\u52A1.*|.*\u9996\u9875.*"
    timeout: 10000
- waitForAnimationToEnd

# Navigate to NFC Checkin (领人签到 / 扫码签到)
- tapOn:
    text: ".*\u9886\u4EBA\u7B7E\u5230.*|.*\u626B\u7801\u7B7E\u5230.*|.*NFC.*|.*Check.*in.*"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: screenshots/manual-ss-ws-nfc-checkin

# Recovery
- back
- waitForAnimationToEnd
- launchApp
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: ".*Start Task.*|.*\u9996\u9875.*"
    timeout: 10000
- waitForAnimationToEnd

# Navigate to Team Batch Report (班组报工)
- tapOn:
    text: ".*\u73ED\u7EC4\u62A5\u5DE5.*|.*Team.*Report.*"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: screenshots/manual-ss-ws-batch-select

# Scroll to see report form
- swipe:
    direction: UP
    duration: 500
- waitForAnimationToEnd
- takeScreenshot: screenshots/manual-ss-ws-report-form

# Recovery
- back
- waitForAnimationToEnd
- launchApp
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: ".*Start Task.*|.*\u9996\u9875.*"
    timeout: 10000
- waitForAnimationToEnd

# Navigate to Workers tab (人员)
- takeScreenshot: screenshots/manual-ss-ws-pre-workers-tab
- tapOn:
    text: "\u4EBA\u5458"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: screenshots/manual-ss-ws-personnel

# Try to find clock-in (打卡)
- tapOn:
    text: ".*\u6253\u5361.*|.*Clock.*|.*\u8003\u52E4.*"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: screenshots/manual-ss-ws-clockin

# Final recovery
- back
- waitForAnimationToEnd
- launchApp
- waitForAnimationToEnd
- takeScreenshot: screenshots/manual-ss-ws-reporting-complete
