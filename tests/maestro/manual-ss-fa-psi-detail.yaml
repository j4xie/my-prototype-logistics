appId: com.cretas.foodtrace
---
# FA PSI detail screenshots: navigate into each PSI function and take screenshots

- launchApp:
    clearState: true

- extendedWaitUntil:
    visible: ".*Login.*|.*Cretas.*|.*Register.*"
    timeout: 30000
- waitForAnimationToEnd
- waitForAnimationToEnd

# Login
- tapOn: "Login"
- waitForAnimationToEnd
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: ".*Enter username.*|.*Username.*"
    timeout: 10000

- tapOn:
    id: "login-username-input"
- eraseText: 30
- inputText: "factory_admin1"

- tapOn:
    id: "login-password-input"
- eraseText: 30
- inputText: "123456"
- hideKeyboard
- waitForAnimationToEnd

- tapOn:
    id: "login-submit-btn"

- extendedWaitUntil:
    visible: "OK"
    timeout: 35000
- tapOn: "OK"
- waitForAnimationToEnd
- waitForAnimationToEnd

# Verify home
- extendedWaitUntil:
    visible: ".*Good.*|.*factory.*|.*AI Insights.*"
    timeout: 15000
- waitForAnimationToEnd

# Screenshot: FA Home
- takeScreenshot: screenshots/manual-ss-fa-home

# Navigate to Management tab (4th from left ~72%)
- tapOn:
    point: "72%,97%"
- waitForAnimationToEnd
- waitForAnimationToEnd

# Screenshot: Management top
- takeScreenshot: screenshots/manual-ss-fa-management-top

# Scroll down to PSI section
- swipe:
    direction: UP
    duration: 600
- waitForAnimationToEnd
- waitForAnimationToEnd

# Screenshot: PSI grid overview
- takeScreenshot: screenshots/manual-ss-fa-psi-overview

# ===== 1. Purchase Orders =====
- scrollUntilVisible:
    element:
      text: "采购订单"
    direction: DOWN
    timeout: 8000
- tapOn:
    text: "采购订单"
- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd
- takeScreenshot: screenshots/manual-ss-fa-purchase-list
- back
- waitForAnimationToEnd
- waitForAnimationToEnd

# ===== 2. Sales Orders =====
