- launchApp
- waitForAnimationToEnd
- takeScreenshot: screenshots/44-fa-recovery-timing
- tapOn: "\u7BA1\u7406"
- waitForAnimationToEnd

# Scroll down more
- swipe:
    direction: UP
    duration: 600
- waitForAnimationToEnd
- swipe:
    direction: UP
    duration: 600
- waitForAnimationToEnd
- swipe:
    direction: UP
    duration: 600
- waitForAnimationToEnd

# === Price List (价格表) ===
