- launchApp
- waitForAnimationToEnd
- takeScreenshot: screenshots/44-fa-recovery-timing
- tapOn: "\u7BA1\u7406"
- waitForAnimationToEnd

# Scroll to very bottom for Disposal Records
- swipe:
    direction: UP
    duration: 600
- waitForAnimationToEnd
- swipe:
    direction: UP
    duration: 600
- waitForAnimationToEnd
- swipe:
    direction: UP
    duration: 600
- waitForAnimationToEnd
- swipe:
    direction: UP
    duration: 600
- waitForAnimationToEnd

# === Disposal Records (报废记录) ===
- tapOn:
    text: ".*\u62A5\u5E9F\u8BB0\u5F55.*|.*\u62A5\u5E9F.*|.*Disposal.*"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: screenshots/44-fa-disposal-records
