appId: com.cretas.foodtrace
---
# QI Quality Inspector screenshots - v6
# Strategy: After landing on inspect list (which works), use
# Maestro's `evalScript` with `runShell` to execute adb input tap
# at exact pixel positions for the remaining tabs.
#
# Tab bar bounds (from uiautomator on 1080x2400 screen):
#   首页: [0,2265][216,2379]       center (108, 2322)
#   质检: [216,2265][432,2379]     center (324, 2322)
#   记录: [432,2265][648,2379]     center (540, 2322)
#   分析: [648,2265][864,2379]     center (756, 2322)
#   我的: [864,2265][1080,2379]    center (972, 2322)

- launchApp:
    clearState: true
- extendedWaitUntil:
    visible: ".*Login.*|.*Cretas.*|.*Register.*"
    timeout: 30000
- waitForAnimationToEnd
- waitForAnimationToEnd
- tapOn: "Login"
- waitForAnimationToEnd
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: ".*Enter username.*|.*Username.*"
    timeout: 10000
- tapOn:
    id: "login-username-input"
- eraseText: 30
- inputText: "quality_insp1"
- tapOn:
    id: "login-password-input"
- eraseText: 30
- inputText: "123456"
- hideKeyboard
- waitForAnimationToEnd
- tapOn:
    id: "login-submit-btn"
- extendedWaitUntil:
    visible: "OK"
    timeout: 60000
- tapOn: "OK"
- waitForAnimationToEnd
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: ".*Welcome.*|.*Good.*|.*Pending.*|.*Working.*"
    timeout: 15000
- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd

# ============================================================
# 1. QI Home
# ============================================================
- takeScreenshot: screenshots/by-role/qi/manual-ss-qi-home

- swipe:
    direction: UP
    duration: 600
- waitForAnimationToEnd
- takeScreenshot: screenshots/by-role/qi/manual-ss-qi-home-scroll

- swipe:
    direction: DOWN
    duration: 600
- waitForAnimationToEnd

# ============================================================
# 2. 质检 Tab — tap the leftmost safe area (10%, 99%) which
#    hits 首页 tab NOT Quick Actions at x=10%
# ============================================================
# First go to 首页 tab (safe - no Quick Action at x=10%)
- tapOn:
    point: "10%,99%"
- waitForAnimationToEnd

# Now tap 质检 tab (safe - no Quick Action at x=30%)
- tapOn:
    point: "30%,99%"
- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd

- takeScreenshot: screenshots/by-role/qi/manual-ss-qi-inspect-list

# ============================================================
# 3-5: Use evalScript + adb for remaining tabs
#       This bypasses Maestro's coordinate translation
# ============================================================

# 3. 记录 Tab via adb
- evalScript: ${run('adb shell input tap 540 2322')}
- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd

- takeScreenshot: screenshots/by-role/qi/manual-ss-qi-records

- swipe:
    direction: UP
    duration: 600
- waitForAnimationToEnd
- takeScreenshot: screenshots/by-role/qi/manual-ss-qi-records-scroll

- swipe:
    direction: DOWN
    duration: 600
- waitForAnimationToEnd

# 4. 分析 Tab via adb
- evalScript: ${run('adb shell input tap 756 2322')}
- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd

- takeScreenshot: screenshots/by-role/qi/manual-ss-qi-analysis

- swipe:
    direction: UP
    duration: 600
- waitForAnimationToEnd
- takeScreenshot: screenshots/by-role/qi/manual-ss-qi-analysis-scroll

- swipe:
    direction: DOWN
    duration: 600
- waitForAnimationToEnd

# 5. 我的 Tab via adb
- evalScript: ${run('adb shell input tap 972 2322')}
- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd

- takeScreenshot: screenshots/by-role/qi/manual-ss-qi-profile

- swipe:
    direction: UP
    duration: 500
- waitForAnimationToEnd
- takeScreenshot: screenshots/by-role/qi/manual-ss-qi-profile-scroll

# Final
- tapOn:
    point: "10%,99%"
- waitForAnimationToEnd
- waitForAnimationToEnd
- takeScreenshot: screenshots/by-role/qi/manual-ss-qi-complete
