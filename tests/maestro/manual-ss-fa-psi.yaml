appId: com.cretas.foodtrace
---
# Manual Screenshots: Factory Admin - 进销存管理
# Captures: management grid, purchase orders, sales orders, finished goods,
#           transfer, AR/AP, price list, return orders

- launchApp:
    clearState: false
- waitForAnimationToEnd

# Login as factory admin
- runFlow: flows/login-fa.yaml

# Wait for home to load
- extendedWaitUntil:
    visible: ".*首页.*|.*Home.*|.*管理.*"
    timeout: 15000
- waitForAnimationToEnd

# Screenshot: Factory Admin Home
- takeScreenshot: screenshots/manual-ss-fa-home

# Navigate to Management tab (管理)
- tapOn:
    text: "管理"
    optional: true
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: ".*管理.*|.*Management.*|.*进销存.*|.*采购.*"
    timeout: 10000
- waitForAnimationToEnd

# Screenshot: Management grid (showing all menu items)
- takeScreenshot: screenshots/manual-ss-fa-management

# Scroll down to see more management items (进销存 section)
- swipe:
    direction: UP
    duration: 600
- waitForAnimationToEnd
- takeScreenshot: screenshots/manual-ss-fa-management-scroll

# --- 1. Purchase Orders (采购订单) ---
- tapOn:
    text: "采购订单"
    optional: true
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: ".*采购.*|.*Purchase.*|.*订单.*"
    timeout: 10000
- waitForAnimationToEnd
- takeScreenshot: screenshots/manual-ss-fa-purchase-list

# Tap on first purchase order for detail
- tapOn:
    text: ".*PO-.*|.*采购.*"
    optional: true
    index: 0
- waitForAnimationToEnd
- takeScreenshot: screenshots/manual-ss-fa-purchase-detail

# Recovery
- back
- waitForAnimationToEnd
- back
- waitForAnimationToEnd
- launchApp
- waitForAnimationToEnd

# --- 2. Sales Orders (销售订单) ---
