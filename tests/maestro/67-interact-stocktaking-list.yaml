appId: com.cretas.foodtrace
---
# Test 67: In-depth Stocktaking List Interaction
# Exercises filter chips, summary button, FAB, search, scroll
# Phase B: Deep page interaction

- launchApp:
    clearState: true
- waitForAnimationToEnd

# Login as restaurant admin
- runFlow: flows/login-restaurant.yaml
- extendedWaitUntil:
    visible: ".*AI Insights.*|.*AI 智能洞察.*|.*Today.*Overview.*|.*首页.*"
    timeout: 15000

# Navigate to 管理 tab first, then Stocktaking sub-section
- tapOn:
    text: ".*Management.*|.*Manage.*|.*管理.*"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: ".*Stocktak.*|.*盘点.*"
    optional: true
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: ".*Stocktak.*|.*盘点.*|.*All.*|.*全部.*"
    timeout: 5000
- takeScreenshot: screenshots/67-stocktaking-initial

# === Filter chip cycle ===
- tapOn:
    text: ".*In Progress.*|.*进行中.*"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: screenshots/67-filter-in-progress

- tapOn:
    text: ".*Completed.*|.*已完成.*"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: screenshots/67-filter-completed

- tapOn:
    text: ".*Cancelled.*|.*已取消.*"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: screenshots/67-filter-cancelled

- tapOn:
    text: ".*All.*|.*全部.*"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: screenshots/67-filter-all

# === Search bar ===
- tapOn:
    text: ".*Search.*|.*搜索食材.*|.*搜索.*"
    optional: true
- waitForAnimationToEnd
- inputText: "test"
- hideKeyboard
- waitForAnimationToEnd
- takeScreenshot: screenshots/67-search-results
- eraseText: 4
- hideKeyboard
- waitForAnimationToEnd

# === Summary button ===
- tapOn:
    text: ".*Summary.*|.*盘点汇总.*"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: screenshots/67-summary

- back
- waitForAnimationToEnd
- launchApp
- waitForAnimationToEnd
- tapOn:
    text: ".*Stocktak.*|.*盘点.*"
    optional: true
- waitForAnimationToEnd

# === FAB ===
- tapOn:
    text: ".*Start.*Count.*|.*发起盘点.*"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: screenshots/67-execute-form

- back
- waitForAnimationToEnd
- launchApp
- waitForAnimationToEnd
- tapOn:
    text: ".*Stocktak.*|.*盘点.*"
    optional: true
- waitForAnimationToEnd

# === Pull-to-refresh ===
- swipe:
    direction: DOWN
    duration: 500
- waitForAnimationToEnd
- takeScreenshot: screenshots/67-after-refresh

# === Scroll ===
- swipe:
    direction: UP
    duration: 600
- waitForAnimationToEnd
- takeScreenshot: screenshots/67-scrolled

# Return to home
- tapOn:
    text: ".*Home.*|.*首页.*"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: screenshots/67-complete
