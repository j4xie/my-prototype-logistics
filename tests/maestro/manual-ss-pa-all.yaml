appId: com.cretas.foodtrace
---
# Manual Screenshots: Platform Admin — all management screens
# Role: platform_admin (Stack navigator, no bottom tabs)
# Dashboard → management list items (List.Item titles) → back/recovery per screen

- launchApp:
    clearState: true
- waitForAnimationToEnd

# Wait for landing page
- extendedWaitUntil:
    visible: ".*Login.*|.*Cretas.*|.*Register.*"
    timeout: 20000
- waitForAnimationToEnd

# Tap Login on landing page
- tapOn:
    text: "Login"
- waitForAnimationToEnd
- waitForAnimationToEnd

# Wait for login form
- extendedWaitUntil:
    visible: ".*Enter username.*|.*Username.*"
    timeout: 10000

# Username
- tapOn:
    id: "login-username-input"
- eraseText: 30
- inputText: "platform_admin"
- hideKeyboard
- waitForAnimationToEnd

# Password
- tapOn:
    id: "login-password-input"
- eraseText: 30
- inputText: "123456"
- hideKeyboard
- waitForAnimationToEnd

# Submit
- tapOn:
    id: "login-submit-btn"

# Wait for role-selection OK dialog
- extendedWaitUntil:
    visible: "OK"
    timeout: 35000
- tapOn: "OK"
- waitForAnimationToEnd
- waitForAnimationToEnd

# Dismiss Location Accuracy dialog if it appears
- tapOn:
    text: "No thanks"
    optional: true
- waitForAnimationToEnd

# Wait for Platform Dashboard to load (may be slow)
- extendedWaitUntil:
    visible: ".*Welcome.*|.*Good.*|.*Platform.*|.*Management.*|.*Factory.*|.*User.*|.*System.*|.*Dashboard.*"
    timeout: 30000
- waitForAnimationToEnd
- waitForAnimationToEnd

# --- 1. Dashboard top ---
- takeScreenshot: screenshots/manual-ss-pa-dashboard

# Scroll down to see Management Functions card
- swipe:
    direction: UP
    duration: 700
- waitForAnimationToEnd
- takeScreenshot: screenshots/manual-ss-pa-dashboard-scroll

# Scroll back to top for first navigation tap
- swipe:
    direction: UP
    duration: 700
- waitForAnimationToEnd

# =============================================================
# 2. Factory Management (工厂管理 / Factory Management)
# =============================================================
- swipe:
    direction: UP
    duration: 500
- waitForAnimationToEnd
- tapOn:
    text: ".*Factory Management.*|.*工厂管理.*"
    optional: true
- waitForAnimationToEnd
- waitForAnimationToEnd
- takeScreenshot: screenshots/manual-ss-pa-factory-list

# Scroll to see more factories
- swipe:
    direction: UP
    duration: 500
- waitForAnimationToEnd
- takeScreenshot: screenshots/manual-ss-pa-factory-list-scroll

# Recovery: back to dashboard
- back
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: ".*Welcome.*|.*平台.*|.*Dashboard.*|.*Management.*"
    timeout: 10000
- waitForAnimationToEnd

# =============================================================
# 3. User Management (用户管理 / User Management)
# =============================================================
