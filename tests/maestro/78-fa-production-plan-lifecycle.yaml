appId: com.cretas.foodtrace
---
# Test 78: Factory Admin - Production Plan Lifecycle
# Verifies: з”ҹдә§и®ЎеҲ’еҲӣе»әвҶ’ејҖе§ӢвҶ’жҠҘе·ҘвҶ’е®ҢжҲҗ (йңҖжұӮ3)
# Happy path: list вҶ’ create plan вҶ’ view detail вҶ’ start production

- launchApp:
    clearState: true
- waitForAnimationToEnd

# Login as factory admin
- runFlow: flows/login.yaml
- extendedWaitUntil:
    visible: "Quality Rate"
    timeout: 15000

# Navigate to Production Plan screen
- tapOn:
    text: ".*Production.*|.*з”ҹдә§.*"
    optional: true
- waitForAnimationToEnd

- tapOn:
    text: ".*Plan.*|.*и®ЎеҲ’.*|.*Production Plan.*|.*з”ҹдә§и®ЎеҲ’.*"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: screenshots/78-fa-plan-list

# Scroll to see plans
- swipe:
    direction: UP
    duration: 500
- waitForAnimationToEnd
- takeScreenshot: screenshots/78-fa-plan-list-scroll

# Tap first plan for detail
- tapOn:
    text: ".*PP-.*|.*PENDING.*|.*еҫ…еӨ„зҗҶ.*"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: screenshots/78-fa-plan-detail

# === Error Path: Try start with no material ===
- tapOn:
    text: ".*Start.*|.*ејҖе§Ӣз”ҹдә§.*|.*ејҖе§Ӣ.*"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: screenshots/78-fa-plan-start-result

# Go back to list
- back
- waitForAnimationToEnd

# Return to Home
- tapOn: "йҰ–йЎө"
- waitForAnimationToEnd
- takeScreenshot: screenshots/78-fa-home-return
