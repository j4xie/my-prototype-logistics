appId: com.cretas.foodtrace
---
# Test 55: Restaurant Wastage Module Navigation
# Verifies 损耗 tab → WastageList screen

- launchApp:
    clearState: true
- waitForAnimationToEnd

# Login as restaurant_admin1
- runFlow: flows/login-restaurant.yaml
- extendedWaitUntil:
    visible: "AI \u667A\u80FD\u6D1E\u5BDF"
    timeout: 10000

# Navigate to 损耗 tab
- tapOn: "\u635F\u8017"
- waitForAnimationToEnd
- takeScreenshot: screenshots/55-wastage-list

# Take screenshot
- takeScreenshot: screenshots/55-wastage-loaded

# Go back to 首页
- tapOn: "\u9996\u9875"
- waitForAnimationToEnd
- assertVisible: "AI \u667A\u80FD\u6D1E\u5BDF"
