appId: com.cretas.foodtrace
---
# Test 73: In-depth HR Attendance Interaction
# Exercises stats cards, date filter (д»Ҡж—Ҙ/еҺҶеҸІ), status filters, refresh
# Phase B: Deep page interaction

- launchApp:
    clearState: true
- waitForAnimationToEnd

# Login as HR admin
- runFlow: flows/login-hr.yaml
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: ".*дәәеҠӣ.*|.*HR.*|.*Staff.*|.*иҖғеӢӨ.*|.*Attendance.*"
    timeout: 10000
- takeScreenshot: screenshots/73-hr-home

# Navigate to attendance management (иҖғеӢӨз®ЎзҗҶ)
- tapOn:
    text: ".*Attendance.*|.*иҖғеӢӨ.*"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: screenshots/73-attendance-initial

# === Date filter toggle ===
# Toggle to д»Ҡж—Ҙ
- tapOn:
    text: ".*Today.*|.*д»Ҡж—Ҙ.*"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: screenshots/73-date-today

# Toggle to еҺҶеҸІ
- tapOn:
    text: ".*History.*|.*еҺҶеҸІ.*"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: screenshots/73-date-history

# Back to д»Ҡж—Ҙ
- tapOn:
    text: ".*Today.*|.*д»Ҡж—Ҙ.*"
    optional: true
- waitForAnimationToEnd

# === Status filter cycle ===
# Filter: жӯЈеёё
- tapOn:
    text: ".*Normal.*|.*жӯЈеёё.*"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: screenshots/73-status-normal

# Filter: иҝҹеҲ°
- tapOn:
    text: ".*Late.*|.*иҝҹеҲ°.*"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: screenshots/73-status-late

# Filter: ж—©йҖҖ
- tapOn:
    text: ".*Early Leave.*|.*ж—©йҖҖ.*"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: screenshots/73-status-early

# Filter: зјәеӢӨ
- tapOn:
    text: ".*Absent.*|.*зјәеӢӨ.*"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: screenshots/73-status-absent

# Back to all (tap жӯЈеёё to deselect or tap all)
- tapOn:
    text: ".*All.*|.*е…ЁйғЁ.*"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: screenshots/73-status-all

# === Search bar ===
- tapOn:
    text: ".*Search.*|.*жҗңзҙўе‘ҳе·Ҙ.*|.*жҗңзҙў.*"
    optional: true
- waitForAnimationToEnd
- inputText: "test"
- hideKeyboard
- waitForAnimationToEnd
- takeScreenshot: screenshots/73-search-results
- eraseText: 4
- hideKeyboard
- waitForAnimationToEnd

# === Tap on an attendance card (anomaly) ===
- tapOn:
    text: ".*Late.*|.*Early Leave.*|.*Absent.*|.*Clock.*|.*иҝҹеҲ°.*|.*ж—©йҖҖ.*|.*зјәеӢӨ.*|.*жү“еҚЎж—¶й—ҙ.*"
    optional: true
    index: 0
- waitForAnimationToEnd
- takeScreenshot: screenshots/73-anomaly-detail

# Back from detail
- back
- waitForAnimationToEnd

# === Pull-to-refresh ===
- swipe:
    direction: DOWN
    duration: 500
- waitForAnimationToEnd
- takeScreenshot: screenshots/73-after-refresh

# === Scroll ===
- swipe:
    direction: UP
    duration: 600
- waitForAnimationToEnd
- takeScreenshot: screenshots/73-scrolled

# Return to home
- launchApp
- waitForAnimationToEnd
- takeScreenshot: screenshots/73-complete
